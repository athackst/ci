_min_copier_version: "9.0.0"

# Keep GitHub Actions expressions like ${{ ... }} untouched.
_envops:
  variable_start_string: "[["
  variable_end_string: "]]"
  block_start_string: "[%"
  block_end_string: "%]"

_subdirectory: template

_answers_file: .copier-answers.ci.yml

# Preserve the shared CI config if it already exists in a destination repo.
_skip_if_exists:
  - .github/ci-config.yml
  - .github/release_template.md

bump_script_path:
  type: str
  default: ""
  help: |
    Optional bump command to run in the target repository (leave empty to disable).

        Available environment variables:
          VERSION
          MAJOR_VERSION
          MINOR_VERSION
          PATCH_VERSION
  
    bump script command:

site_generator:
  type: str
  default: none
  choices:
    - none
    - mkdocs
    - jekyll
  help: Site workflow backend to use for docs publishing.

automerge_mode:
  type: str
  default: poll
  choices:
    - poll
    - native
    - disabled
  help: How pull requests labeled automerge should be merged.

site_version:
  type: bool
  default: false
  help: "DEPRECATED: Replaced by do_releases."
  when: false

do_releases:
  type: bool
  default: "[[ site_versions if site_versions is defined else false ]]"
  help: Whether to create releases or new versions.

release_template:
  type: str
  default: |
    ## What's changed

    $CHANGES
  help: Template for release description body, using $CHANGES for the changelog and $VERSION for the resolved version.
  when: "[[ do_releases ]]"
