categories:
  - title: ':zap: Breaking'
    labels: 
      - 'breaking'
      - 'major'
  - title: ':rocket: New'
    labels: 
      - 'feature'
      - 'enhancement'
  - title: ':bug: Bug Fixes'
    labels: 
      - 'bug'
      - 'fix'
  - title: ':toolbox: Maintenance'
    labels: 
      - 'maintenance'
      - 'devops'
  - title: ':memo: Documentation'
    labels:
      - 'docs' 
      - 'documentation'
  - title: 'Dependency Updates'
    label: 'dependencies'
    collapse-after: 3

exclude-labels:
  - 'skip-changelog'
