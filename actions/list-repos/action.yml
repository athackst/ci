name: List Repos
description: List repositories for a user and return a filtered JSON array of repository metadata.
inputs:
  github-token:
    description: GitHub token used for GitHub API access.
    required: false
    default: ${{ github.token }}
  user:
    description: GitHub username whose repositories should be listed.
    required: false
    default: ""
  public:
    description: Include public repositories when true. Set to false to exclude them.
    required: false
    default: "true"
  private:
    description: Include private repositories when true. Set to false to exclude them.
    required: false
    default: "true"
  fork:
    description: Include fork repositories when true. Set to false to exclude them.
    required: false
    default: "true"
  archived:
    description: Include archived repositories when true. Set to false to exclude them.
    required: false
    default: "true"
  filter-paths:
    description: Optional newline-delimited repository paths. Repositories are returned only if any listed path exists.
    required: false
    default: ""
  output-path:
    description: Optional path to write the repository JSON file.
    required: false
    default: ".github/repositories.json"
outputs:
  repository-file:
    description: Path to a JSON file containing matching repository metadata objects.
    value: ${{ steps.list.outputs.repository-file }}
runs:
  using: composite
  steps:
    - name: List repositories
      id: list
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        USER: ${{ inputs.user || github.repository_owner }}
        PUBLIC: ${{ inputs.public }}
        PRIVATE: ${{ inputs.private }}
        FORK: ${{ inputs.fork }}
        ARCHIVED: ${{ inputs.archived }}
        FILTER_PATHS: ${{ inputs.filter-paths }}
        OUTPUT_PATH: ${{ inputs.output-path }}
      run: |
        set -euo pipefail
        REPOSITORIES="$("${{ github.action_path }}/get_repos.sh")"
        mkdir -p "$(dirname "$OUTPUT_PATH")"
        printf '%s\n' "$REPOSITORIES" > "$OUTPUT_PATH"
        echo "repository-file=$OUTPUT_PATH" >> "$GITHUB_OUTPUT"
