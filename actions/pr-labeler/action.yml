name: PR Labeler
description: Label PRs using a centralized configuration file shipped with this action.
inputs:
  github_token:
    description: "GitHub token with permissions to read PRs and add labels. Defaults to the provided GITHUB_TOKEN secret."
    required: false
    default: "${{ github.token }}"
  configuration-path:
    description: "Path to the labeler configuration file. Defaults to 'labeler.yml' in the action's root directory."
    required: false
    default: ""
outputs:
  new-labels:
    description: "New labels added by the labeler action."
    value: ${{ steps.labeler.outputs.new-labels }}
runs:
  using: composite
  steps:
    - name: Install Python dependencies
      shell: bash
      run: |
        python3 -m pip install --quiet pyyaml jsonschema

    - name: PR Labeler configuration
      id: config
      shell: bash
      run: |
        set -euo pipefail

        FLAT_CONFIG_PATH="$RUNNER_TEMP/pr-labeler-config.yml"
        python3 "${{ github.action_path }}/resolve_labeler_config.py" \
          --configuration-path "${{ inputs.configuration-path }}" \
          --default-configuration-path "${{ github.action_path }}/labeler.yml" \
          --output-path "$FLAT_CONFIG_PATH" \
          --repo "${{ github.repository }}" \
          --ref "${{ github.sha }}" \
          --github-token "${{ inputs.github_token }}" | tee -a "$GITHUB_OUTPUT"

        echo "Using the following PR Labeler configuration:"
        cat "$FLAT_CONFIG_PATH"

    - name: Label PR
      id: labeler
      uses: athackst/labeler@feature/label-color
      with:
        configuration-path: ${{ steps.config.outputs.config-path }}
        repo-token: ${{ inputs.github_token }}
