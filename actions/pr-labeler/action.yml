name: PR Labeler
description: Label PRs using a centralized configuration file shipped with this action.
inputs:
  github_token:
    description: "GitHub token with permissions to read PRs and add labels. Defaults to the provided GITHUB_TOKEN secret."
    required: false
    default: "${{ github.token }}"
  configuration-path:
    description: "Path to the labeler configuration file."
    required: false
    default: ""
outputs:
  new-labels:
    description: "New labels added by the labeler action."
    value: ${{ steps.labeler.outputs.new-labels }}
runs:
  using: composite
  steps:
    - name: Install Python dependencies
      shell: bash
      run: |
        python3 -m pip install --quiet pyyaml jsonschema

    - name: Setup configuration
      id: config
      shell: bash
      run: |
        set -euo pipefail

        DEFAULT_CONFIG_PATH="${{ github.action_path }}/labeler.yml"
        RESOLVED_CONFIG_PATH="${{ inputs.configuration-path }}"

        if [ -z "$RESOLVED_CONFIG_PATH" ]; then
          RESOLVED_CONFIG_PATH="$DEFAULT_CONFIG_PATH"
        elif [ ! -f "$RESOLVED_CONFIG_PATH" ]; then
          echo "Configuration path not found: $RESOLVED_CONFIG_PATH"
          echo "Falling back to bundled config: $DEFAULT_CONFIG_PATH"
          RESOLVED_CONFIG_PATH="$DEFAULT_CONFIG_PATH"
        fi

        [ -f "$RESOLVED_CONFIG_PATH" ] || { echo "Config not found: $RESOLVED_CONFIG_PATH"; exit 1; }

        FLAT_CONFIG_PATH="$RUNNER_TEMP/pr-labeler-config.yml"
        python3 "${{ github.action_path }}/resolve_labeler_config.py" \
          --config-path "$RESOLVED_CONFIG_PATH" \
          --output-path "$FLAT_CONFIG_PATH" | tee -a "$GITHUB_OUTPUT"

        echo "Using the following PR Labeler configuration:"
        cat "$FLAT_CONFIG_PATH"

    - name: Label PR
      id: labeler
      uses: actions/labeler@v5
      with:
        configuration-path: ${{ steps.config.outputs.config-path }}
        repo-token: ${{ inputs.github_token }}
