name: 'Configure Site'
description: 'Resolve normalized site location settings from explicit hosting values or GitHub Pages.'

inputs:
  host:
    description: 'The site host or origin.'
    required: false
    default: ''
  base-path:
    description: 'The path beneath the site host.'
    required: false
    default: ''
  base-url:
    description: 'The full site base URL.'
    required: false
    default: ''
  version:
    description: 'The version path appended to the site location.'
    required: false
    default: ''

outputs:
  host:
    description: 'The normalized site host.'
    value: ${{ steps.settings.outputs.host }}
  base-path:
    description: 'The normalized site base path.'
    value: ${{ steps.settings.outputs.base-path }}
  base-url:
    description: 'The normalized site base URL.'
    value: ${{ steps.settings.outputs.base-url }}
  version:
    description: 'The normalized version.'
    value: ${{ steps.settings.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Validate explicit site settings
      if: ${{ inputs.host == '' && (inputs.base-path != '' || inputs.base-url != '') }}
      shell: bash
      run: |
        echo "host is required when base-path or base-url is provided."
        exit 1

    - name: Setup Pages
      if: ${{ inputs.host == '' }}
      id: pages
      uses: actions/configure-pages@v6

    - name: Resolve site settings
      id: settings
      shell: bash
      env:
        INPUT_HOST: ${{ inputs.host }}
        INPUT_BASE_PATH: ${{ inputs.base-path }}
        INPUT_BASE_URL: ${{ inputs.base-url }}
        INPUT_VERSION: ${{ inputs.version }}
        PAGES_ORIGIN: ${{ steps.pages.outputs.origin }}
        PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}
      run: |
        set -euo pipefail

        host="$INPUT_HOST"
        base_path="$INPUT_BASE_PATH"
        base_url="$INPUT_BASE_URL"
        if [ -z "$host" ]; then
          host="$PAGES_ORIGIN"
          base_path="$PAGES_BASE_PATH"
          base_url="$PAGES_BASE_URL"
        fi

        settings="$(python3 "${{ github.action_path }}/resolve_site_settings.py" \
          --host "$host" \
          --base-path "$base_path" \
          --base-url "$base_url" \
          --version "$INPUT_VERSION")"

        echo "host=$(jq -r '.host' <<< "$settings")" | tee -a "$GITHUB_OUTPUT"
        echo "base-path=$(jq -r '.base_path' <<< "$settings")" | tee -a "$GITHUB_OUTPUT"
        echo "base-url=$(jq -r '.base_url' <<< "$settings")" | tee -a "$GITHUB_OUTPUT"
        echo "version=$(jq -r '.version' <<< "$settings")" | tee -a "$GITHUB_OUTPUT"
