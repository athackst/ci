name: Build a Jekyll Site

on:
  workflow_call:
    inputs:
      source:
        description: Optional source directory for the site
        type: string
        required: false
        default: "."
      version:
        description: Optional Version identifier to publish, for example 1.2.3
        type: string
        required: false
        default: ""
      semiliterate:
        description: Extract docs with semiliterate
        type: boolean
        required: false
        default: true
      artifact-name:
        description: "Artifact name for the built site."
        type: string
        required: false
        default: "github-pages"
    outputs:
      host:
        description: The host name for the site
        value: ${{ jobs.build-site.outputs.host }}
      base-path:
        description: The base-path for the site
        value: ${{ jobs.build-site.outputs.base-path }}
      base-url:
        description: The base url for the site
        value: ${{ jobs.build-site.outputs.base-url }}
      version:
        description: The version number
        value: ${{ jobs.build-site.outputs.version }}
      artifact-name:
        description: The name of the site artifact
        value: ${{ jobs.build-site.outputs.artifact-name }}

jobs:
  build-site:
    runs-on: ubuntu-latest
    outputs:
      host: ${{ steps.pages.outputs.host }}
      base-path: ${{ steps.pages.outputs.base_path }}
      base-url: ${{ steps.pages.outputs.base_url }}
      version: ${{ steps.settings.outputs.version }}
      version_config: ${{ steps.settings.outputs.version_config }}
      artifact-name: ${{ inputs.artifact-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Settings
        id: settings
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          echo "version=${version}" | tee -a "$GITHUB_OUTPUT"

          versions_path=""
          versions_config=""
          if [ -n "$version" ]; then
            versions_path="/${version}"
            versions_config="${{ steps.pages.outputs.base_path }}/versions.json"
          fi

          echo "versions_path=${versions_path}" | tee -a "$GITHUB_OUTPUT"
          echo "versions_config=${versions_config}" | tee -a "$GITHUB_OUTPUT"

      - name: Configure Jekyll site
        id: config
        uses: athackst/ci/actions/jekyll-config@main
        with:
          versions_config: ${{ steps.settings.outputs.versions_config }}
          base_path: ${{ steps.pages.outputs.base_path }}

      - name: Extract with semiliterate
        if: ${{ inputs.semiliterate }}
        id: semiliterate
        uses: PrimerPages/semiliterate@main
        with:
          config: semiliterate.yml
          source: ${{ inputs.source }}
          out: jekyll-site
          verbose: true

      - name: Debug semiliterate
        shell: bash
        run: |
          ls 
          tree jekyll-site

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.313.0
        with:
          ruby-version: 3.3.4
          bundler-cache: true

      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        env:
          JEKYLL_ENV: production
          JEKYLL_GITHUB_TOKEN: ${{ github.token }}
          BASEURL: ${{ steps.pages.outputs.base_path }}${{ steps.settings.outputs.versions_path }}
          SOURCE: ${{ steps.semiliterate.outputs.out  || '.' }}
          CONFIG_FILE: "_config.yml"
        run: bundle exec jekyll build --baseurl "${BASEURL}" --source "${SOURCE}" --config "${CONFIG_FILE}"

      - name: Debug output
        run: |
          tree _site
          cat _site/index.html

      - name: Upload artifact
        id: artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: ${{ inputs.artifact-name }}
          path: _site
