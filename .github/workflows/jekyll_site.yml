name: Jekyll Site

on:
  workflow_call:
    inputs:
      source:
        description: Optional source directory for the site
        type: string
        required: false
        default: "."
      version:
        description: Optional Version identifier to publish, for example 1.2.3
        type: string
        required: false
        default: ""
      semiliterate:
        description: Extract docs with semiliterate
        type: boolean
        required: false
        default: true
      artifact-name:
        description: "Artifact name for the built site."
        type: string
        required: false
        default: "github-pages"
      host:
        description: "Optional site host or origin."
        type: string
        required: false
        default: ""
      base-path:
        description: "Optional path beneath the configured host."
        type: string
        required: false
        default: ""
      base-url:
        description: "Optional full site base URL."
        type: string
        required: false
        default: ""
    outputs:
      host:
        description: The host name for the site
        value: ${{ jobs.build-site.outputs.host }}
      base-path:
        description: The base-path for the site
        value: ${{ jobs.build-site.outputs.base-path }}
      base-url:
        description: The base url for the site
        value: ${{ jobs.build-site.outputs.base-url }}
      version:
        description: The version number
        value: ${{ jobs.build-site.outputs.version }}
      artifact-name:
        description: The name of the site artifact
        value: ${{ jobs.build-site.outputs.artifact-name }}

jobs:
  build-site:
    runs-on: ubuntu-latest
    outputs:
      host: ${{ steps.site.outputs.host }}
      base-path: ${{ steps.site.outputs.base-path }}
      base-url: ${{ steps.site.outputs.base-url }}
      version: ${{ steps.site.outputs.version }}
      artifact-name: ${{ inputs.artifact-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Configure site
        id: site
        uses: athackst/ci/actions/configure-site@main
        with:
          host: ${{ inputs.host }}
          base-path: ${{ inputs.base-path }}
          base-url: ${{ inputs.base-url }}
          version: ${{ inputs.version }}

      - name: Configure Jekyll site
        id: config
        uses: athackst/ci/actions/jekyll-config@main
        with:
          versions_config: ${{ steps.site.outputs.version != '' && format('{0}/versions.json', steps.site.outputs.base-path) || '' }}
          base_path: ${{ steps.site.outputs.base-path }}

      - name: Extract with semiliterate
        if: ${{ inputs.semiliterate }}
        id: semiliterate
        uses: PrimerPages/semiliterate@main
        with:
          config: semiliterate.yml
          source: ${{ inputs.source }}
          out: jekyll-site
          verbose: true

      - name: Debug semiliterate
        shell: bash
        run: |
          ls 
          tree jekyll-site

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.319.0
        with:
          ruby-version: 3.3.4
          bundler-cache: true

      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        env:
          JEKYLL_ENV: production
          JEKYLL_GITHUB_TOKEN: ${{ github.token }}
          BASEURL: ${{ steps.site.outputs.base-path }}${{ steps.site.outputs.version != '' && format('/{0}', steps.site.outputs.version) || '' }}
          SOURCE: ${{ steps.semiliterate.outputs.out  || '.' }}
          CONFIG_FILE: "_config.yml"
        run: bundle exec jekyll build --baseurl "${BASEURL}" --source "${SOURCE}" --config "${CONFIG_FILE}"

      - name: Debug output
        run: |
          tree _site

      - name: Upload artifact
        id: artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: ${{ inputs.artifact-name }}
          path: _site
