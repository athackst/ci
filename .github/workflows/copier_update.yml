name: Copier Update

on:
  pull_request:
    paths:
      - "copier.yml"
      - "template/**"
  push:
    branches:
      - main
    paths:
      - "copier.yml"
      - "template/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: copier-update-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  copier-update:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.CI_BOT_TOKEN || github.token }}

      - name: Install Copier
        shell: bash
        run: |
          python3 -m pip install --quiet copier

      - name: Apply Copier template
        id: copier
        shell: bash
        run: |
          set -euo pipefail
          copier copy --trust --defaults --overwrite . .

      - name: Commit generated workflow updates
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t GENERATED_FILES < <(grep -Ev '^\s*(#|$)' copier_update_paths.txt)

          if [ "${#GENERATED_FILES[@]}" -eq 0 ]; then
            echo "No Copier-managed generated files are configured."
            echo "changed=false" | tee -a "$GITHUB_OUTPUT"
            {
              echo "updated-files<<EOF"
              echo ""
              echo "EOF"
            } | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          git add -A -- "${GENERATED_FILES[@]}"

          STAGED_FILES="$(git diff --cached --name-only -- "${GENERATED_FILES[@]}")"

          if git diff --cached --quiet; then
            echo "changed=false" | tee -a "$GITHUB_OUTPUT"
            {
              echo "updated-files<<EOF"
              echo ""
              echo "EOF"
            } | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "updated-files<<EOF"
            printf '%s\n' "$STAGED_FILES"
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"
          echo "changed=true" | tee -a "$GITHUB_OUTPUT"

      - name: Build Copier update comment body
        id: copier-comment
        if: ${{ steps.commit.outputs.changed == 'true' }}
        shell: bash
        env:
          UPDATED_FILES: ${{ steps.commit.outputs.updated-files || '' }}
          MARKER: "<!-- ci:copier-update -->"
        run: |
          set -euo pipefail
          {
            echo "marker=$MARKER"
            echo "body<<EOF"
            echo "$MARKER"
            echo "Applied Copier-generated workflow updates."
            if [ -n "${UPDATED_FILES}" ]; then
              echo
              echo "Updated files:"
              echo '```text'
              printf '%s\n' "${UPDATED_FILES}"
              echo '```'
            fi
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Push commit
        if: ${{ github.event_name == 'pull_request' && steps.commit.outputs.changed == 'true' }}
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update generated workflows from Copier template"
          git push origin "HEAD:refs/heads/${HEAD_REF}"

      - name: Find existing Copier update comment
        id: find-copier-comment
        if: ${{ github.event_name == 'pull_request' && steps.commit.outputs.changed == 'true' }}
        uses: peter-evans/find-comment@v4
        with:
          token: ${{ secrets.CI_BOT_TOKEN || github.token }}
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: ${{ steps.copier-comment.outputs.marker }}

      - name: Create or update Copier update comment
        if: ${{ github.event_name == 'pull_request' && steps.commit.outputs.changed == 'true' }}
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.CI_BOT_TOKEN || github.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-copier-comment.outputs.comment-id }}
          body: ${{ steps.copier-comment.outputs.body }}
          edit-mode: replace

      - name: Create or update copier PR
        id: copier-pr
        if: ${{ github.event_name != 'pull_request' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.CI_BOT_TOKEN || github.token }}
          branch: "ci/pr-copier-update"
          commit-message: "Apply copier update"
          title: "Apply copier update"
          body: ${{ steps.copier-comment.outputs.body }}
          labels: automerge

      - name: Setup labels
        id: setup-labels
        if: ${{ github.event_name != 'pull_request' }}
        uses: athackst/ci/actions/setup-labels@main
        with:
          github-token: ${{ secrets.CI_BOT_TOKEN || github.token }}
          configuration-path: .github/ci-config.yml

      - name: Workflow summary
        if: ${{ always() }}
        shell: bash
        env:
          UPDATED_FILES: ${{ steps.commit.outputs.updated-files || '' }}
        run: |
          set -euo pipefail
          {
            echo "### Copier Update"
            echo ""
            if [ -n "${UPDATED_FILES}" ]; then
              echo "Updated generated workflow files:"
              echo ""
              echo '```text'
              printf '%s\n' "${UPDATED_FILES}"
              echo '```'
            else
              echo "No generated workflow file changes to commit."
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
