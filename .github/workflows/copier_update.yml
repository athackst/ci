name: Copier Update

on:
  workflow_call:
    inputs:
      dry-run:
        description: Detect and report template changes while preserving repository state.
        type: boolean
        required: false
        default: false
      pr-branch:
        description: Branch name used for template updates.
        type: string
        required: false
        default: copier/update-template
      pr-title:
        description: Pull request title.
        type: string
        required: false
        default: "chore: update Copier template"
      pr-labels:
        description: Comma-separated list of labels to apply to the PR.
        type: string
        required: false
        default: ""
      commit-message:
        description: Commit message for template updates.
        type: string
        required: false
        default: "chore: apply Copier template update"
      checkout-ref:
        description: Optional git ref to check out before applying template updates.
        type: string
        required: false
        default: ""
      template-ref:
        description: Optional Copier template ref to update from.
        type: string
        required: false
        default: ""
      answers-file:
        description: Copier answers file to use for the update.
        type: string
        required: false
        default: .copier-answers.yml
    secrets:
      token:
        description: Optional token override for checkout, push, and PR operations.
        required: false
    outputs:
      changed:
        description: Whether template changes were produced by Copier.
        value: ${{ jobs.update.outputs.changed }}
      changed-files:
        description: Newline-delimited list of Copier-managed files changed by the update.
        value: ${{ jobs.update.outputs.changed-files }}
      pr-branch:
        description: Branch name used for the update PR; empty when no PR is created.
        value: ${{ jobs.update.outputs.pr-branch }}
      pr-url:
        description: URL for the update PR; empty when no PR is created.
        value: ${{ jobs.update.outputs.pr-url }}

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
      changed-files: ${{ steps.changes.outputs.changed-files }}
      pr-branch: ${{ steps.pr.outputs.pull-request-branch }}
      pr-url: ${{ steps.pr.outputs.pull-request-url }}
    env:
      ANSWERS_FILE: ${{ inputs.answers-file }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
          fetch-depth: 0
          token: ${{ secrets.token || github.token }}

      - name: Install Copier
        shell: bash
        run: |
          python3 -m pip install --quiet copier

      - name: Apply template updates
        id: apply
        shell: bash
        env:
          VCS_REF: ${{ inputs.template-ref }}
        run: |
          set -euo pipefail
          if [ ! -f "$ANSWERS_FILE" ]; then
            echo "Required Copier answers file not found: $ANSWERS_FILE"
            echo "answers-found=false" | tee -a "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "answers-found=true" | tee -a "$GITHUB_OUTPUT"
          copier_args=(update --trust -a "$ANSWERS_FILE" -A --defaults)
          if [ -n "$VCS_REF" ]; then
            copier_args+=(--vcs-ref "$VCS_REF")
          fi

          printf -v COPIER_COMMAND '%q ' copier "${copier_args[@]}"
          COPIER_COMMAND="${COPIER_COMMAND% }"
          echo "command=$COPIER_COMMAND" | tee -a "$GITHUB_OUTPUT"
          copier "${copier_args[@]}"

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          STATUS_OUTPUT="$(git status --short)"

          if [ -n "$STATUS_OUTPUT" ]; then
            CHANGED_FILES="$(printf '%s\n' "$STATUS_OUTPUT" | sed -E 's/^.. //')"
            echo "changed=true" | tee -a "$GITHUB_OUTPUT"
            {
              echo "changed-files<<EOF_CHANGED_FILES"
              printf '%s\n' "$CHANGED_FILES"
              echo "EOF_CHANGED_FILES"
            } | tee -a "$GITHUB_OUTPUT"

            echo "Detected Copier-managed changes:"
            printf '%s\n' "$STATUS_OUTPUT"
            echo ""
            echo "Diffstat:"
            git diff --stat
            echo ""
            echo "Diff:"
            git diff
          else
            echo "changed=false" | tee -a "$GITHUB_OUTPUT"
            echo "No Copier-managed changes detected."
          fi

      - name: Detect Copier conflicts
        id: conflicts
        if: ${{ steps.changes.outputs.changed == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          CONFLICTED_FILES="$(git diff --name-only --diff-filter=U)"

          if [ -z "$CONFLICTED_FILES" ]; then
            echo "found=false" | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" | tee -a "$GITHUB_OUTPUT"
          {
            echo "files<<EOF_CONFLICTED_FILES"
            printf '%s\n' "$CONFLICTED_FILES"
            echo "EOF_CONFLICTED_FILES"
          } | tee -a "$GITHUB_OUTPUT"

          echo "Copier update left merge conflicts in managed files:"
          printf '%s\n' "$CONFLICTED_FILES"
          echo ""
          echo "Conflict index entries:"
          git ls-files -u
          echo ""
          echo "Diff:"
          git diff
          echo "Stopping before PR creation because Copier produced merge conflicts."
          exit 1

      - name: Create or update PR
        id: pr
        if: ${{ !inputs.dry-run && steps.changes.outputs.changed == 'true' && steps.conflicts.outputs.found != 'true' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.token || github.token }}
          base: ${{ github.event.repository.default_branch }}
          branch: ${{ inputs.pr-branch }}
          commit-message: ${{ inputs.commit-message }}
          title: ${{ inputs.pr-title }}
          body: ${{ inputs.commit-message }}
          labels: ${{ inputs.pr-labels }}

      - name: Verify PR result
        if: ${{ always() && !inputs.dry-run && steps.changes.outputs.changed == 'true' && steps.conflicts.outputs.found != 'true' }}
        shell: bash
        env:
          PR_URL: ${{ steps.pr.outputs.pull-request-url }}
        run: |
          set -euo pipefail
          if [ -z "$PR_URL" ]; then
            echo "Copier produced changes, but no pull request was created or updated."
            exit 1
          fi

          echo "Pull request created or updated: $PR_URL"

      - name: Workflow summary
        if: ${{ always() }}
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
          COPIER_COMMAND: ${{ steps.apply.outputs.command || '' }}
          ANSWERS_FOUND: ${{ steps.apply.outputs.answers-found || 'false' }}
          APPLY_STATUS: ${{ steps.apply.outcome || 'skipped' }}
          CHANGED: ${{ steps.changes.outputs.changed || 'false' }}
          CHANGED_FILES: ${{ steps.changes.outputs.changed-files || '' }}
          CONFLICT_FOUND: ${{ steps.conflicts.outputs.found || 'false' }}
          CONFLICTED_FILES: ${{ steps.conflicts.outputs.files || '' }}
          DRY_RUN: ${{ inputs.dry-run }}
          PR_BRANCH_INPUT: ${{ inputs.pr-branch }}
          PR_OPERATION: ${{ steps.pr.outputs.pull-request-operation }}
          PR_NUMBER: ${{ steps.pr.outputs.pull-request-number }}
          PR_URL: ${{ steps.pr.outputs.pull-request-url }}
          PR_BRANCH: ${{ steps.pr.outputs.pull-request-branch }}
        run: |
          set -euo pipefail

          {
            echo "## Copier Update"
            echo ""

            case "${JOB_STATUS}" in
              success)
                echo ":white_check_mark: Workflow completed successfully."
                ;;
              failure)
                echo ":x: Workflow failed."
                ;;
              cancelled)
                echo ":warning: Workflow was cancelled."
                ;;
            esac
            echo ""

            if [ "${APPLY_STATUS}" = "skipped" ]; then
              echo ":x: Copier update did not run because an earlier step failed."
            elif [ "${ANSWERS_FOUND}" != "true" ]; then
              echo ":x: Required Copier answers file not found: \`${ANSWERS_FILE}\`."
            elif [ "${APPLY_STATUS}" != "success" ]; then
              echo ":x: Copier update command failed."
            elif [ "${CONFLICT_FOUND}" = "true" ]; then
              echo ":x: Copier update produced merge conflicts; no PR was created."
              echo ""
              echo "Resolve these files in the consumer repo, then rerun Copier Update."
              echo ""
              echo "conflicted-files:"
              echo '```text'
              printf '%s\n' "${CONFLICTED_FILES}"
              echo '```'
            elif [ "${CHANGED}" != "true" ]; then
              echo ":white_check_mark: Copier ran, but no file changes were produced."
            elif [ "${DRY_RUN}" = "true" ]; then
              echo ":white_check_mark: Dry run detected template changes."
            elif [ -n "${PR_URL}" ]; then
              if [ "${JOB_STATUS}" = "success" ]; then
                echo ":white_check_mark: PR created or updated successfully."
              else
                echo ":warning: PR created or updated before a later workflow step failed."
              fi
              echo ""
              echo "pr-operation: \`${PR_OPERATION:-unknown}\`"
              echo "pr-number: \`${PR_NUMBER}\`"
              echo "pr-branch: \`${PR_BRANCH:-$PR_BRANCH_INPUT}\`"
              echo "pr-url: ${PR_URL}"
            else
              echo ":x: No PR created or updated."
              echo ""
              echo "pr-operation: \`${PR_OPERATION:-none}\`"
            fi

            if [ -n "${CHANGED_FILES}" ] && [ "${CONFLICT_FOUND}" != "true" ]; then
              echo ""
              echo "changed-files:"
              echo '```text'
              printf '%s\n' "${CHANGED_FILES}"
              echo '```'
            fi

            if [ "${JOB_STATUS}" = "failure" ] && [ -n "${COPIER_COMMAND}" ]; then
              echo ""
              echo "Manual recovery command:"
              echo '```bash'
              printf '%s\n' "${COPIER_COMMAND}"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
