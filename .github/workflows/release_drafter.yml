name: Release Draft
on:
  workflow_call:
    inputs:
      configuration-path:
        description: Optional path to release-drafter config file.
        type: string
        required: false
        default: ".github/ci-config.yml"
      name:
        description: Optional explicit release name override.
        type: string
        required: false
        default: ""
      tag-name:
        description: Optional explicit release tag name override.
        type: string
        required: false
        default: ""
      dry-run:
        description: Preview the generated release draft.
        type: boolean
        required: false
        default: false
    secrets:
      token:
        description: Optional token override used to create or update draft release.
        required: false

    outputs:
      id:
        description: Draft release id.
        value: ${{ jobs.release-draft.outputs.id }}
      name:
        description: Draft release name.
        value: ${{ jobs.release-draft.outputs.name }}
      tag-name:
        description: Draft release tag name.
        value: ${{ jobs.release-draft.outputs.tag-name }}
      html-url:
        description: Draft release html url.
        value: ${{ jobs.release-draft.outputs.html-url }}
      upload-url:
        description: Draft release upload url.
        value: ${{ jobs.release-draft.outputs.upload-url }}
      resolved-version:
        description: Resolved semantic version used for defaults.
        value: ${{ jobs.release-draft.outputs.resolved-version }}
      changelog:
        description: Generated changelog markdown body.
        value: ${{ jobs.release-draft.outputs.changelog }}

jobs:
  release-draft:
    concurrency:
      group: release-draft-${{ github.repository }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    outputs:
      id: ${{ steps.release.outputs.id }}
      name: ${{ steps.release.outputs.name }}
      tag-name: ${{ steps.release.outputs.tag_name }}
      html-url: ${{ steps.release.outputs.html_url }}
      upload-url: ${{ steps.release.outputs.upload_url }}
      resolved-version: ${{ steps.release.outputs.resolved_version }}
      changelog: ${{ steps.release.outputs.body }}
    steps:
      - name: Resolve configuration name
        id: config
        shell: bash
        env:
          CONFIGURATION_PATH: ${{ inputs.configuration-path }}
        run: |
          set -euo pipefail
          CONFIG_NAME="${CONFIGURATION_PATH#.github/}"
          echo "config-name=$CONFIG_NAME" | tee -a "$GITHUB_OUTPUT"

      - name: Create or update draft release
        id: release
        uses: release-drafter/release-drafter@v7.5.1
        with:
          token: ${{ secrets.token || github.token }}
          config-name: ${{ steps.config.outputs.config-name }}
          name: ${{ inputs.name }}
          tag: ${{ inputs.tag-name }}
          dry-run: ${{ inputs.dry-run }}

      - name: Workflow summary
        if: ${{ always() }}
        shell: bash
        env:
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
          RESOLVED_VERSION: ${{ steps.release.outputs.resolved_version }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail
          {
            echo "### Release Draft"
            echo ""
            echo "- Result: $RELEASE_OUTCOME"
            echo "- Dry run: $DRY_RUN"
            if [ -n "$RESOLVED_VERSION" ]; then
              echo "- Resolved version: $RESOLVED_VERSION"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
