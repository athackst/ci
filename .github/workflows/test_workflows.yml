name: Test Workflows

on:
  pull_request:

concurrency:
  group: "test-workflows-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  workflow-validation:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: actionlint
        uses: raven-actions/actionlint@v2.2.0
        with:
          files: ".github/workflows/*.yml"

      - name: Test workflow scripts
        shell: bash
        run: python3 -m unittest discover -s .github/scripts/tests -p "test_*.py"

  workflow-mkdocs-site:
    permissions:
      contents: read
      pages: read
    uses: ./.github/workflows/mkdocs_site.yml
    secrets: inherit
    with:
      artifact-name: github-pages-mkdocs-test
      version: dev

  workflow-mkdocs-site-verify:
    permissions:
      contents: read
    needs: [workflow-mkdocs-site]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify mkdocs workflow result
        shell: bash
        env:
          WORKFLOW_RESULT: ${{ needs.workflow-mkdocs-site.result }}
          SITE_HOST: ${{ needs.workflow-mkdocs-site.outputs.host }}
          SITE_BASE_PATH: ${{ needs.workflow-mkdocs-site.outputs.base-path }}
          SITE_BASE_URL: ${{ needs.workflow-mkdocs-site.outputs.base-url }}
          SITE_VERSION: ${{ needs.workflow-mkdocs-site.outputs.version }}
        run: |
          test "$WORKFLOW_RESULT" = "success"
          test -n "$SITE_HOST"
          test -n "$SITE_BASE_URL"
          test "$SITE_VERSION" = "dev"

      - name: Download mkdocs artifact
        uses: actions/download-artifact@v8
        with:
          name: github-pages-mkdocs-test
          path: ./artifact

      - name: Verify mkdocs artifact contents
        id: verify-mkdocs
        shell: bash
        run: |
          set -euo pipefail

          STATUS="success"
          SUMMARY="MkDocs artifact extracted successfully and includes site/index.html."
          ERRORS=()

          set_failure() {
            STATUS="failure"
            ERRORS+=("$1")
          }

          mkdir -p site
          if [ -f ./artifact/artifact.tar ]; then
            tar --directory site -xvf ./artifact/artifact.tar
          else
            TAR_FILE="$(find ./artifact -maxdepth 2 -type f -name '*.tar' | head -n1)"
            if [ -n "$TAR_FILE" ]; then
              tar --directory site -xvf "$TAR_FILE"
            else
              cp -R ./artifact/. site/
            fi
          fi

          test -f site/index.html || set_failure "site/index.html was missing"
          if [ -f site/index.html ]; then
            grep -q "<html" site/index.html || set_failure "site/index.html did not contain an HTML tag"
          fi

          if [ "$STATUS" != "success" ]; then
            SUMMARY="MkDocs artifact verification failed."
          fi

          {
            echo "summary=$SUMMARY"
            echo "errors<<EOF_ERRORS"
            printf '%s\n' "${ERRORS[@]}"
            echo "EOF_ERRORS"
            echo "details<<EOF_DETAILS"
            find site -maxdepth 2 -type f | sort
            echo "EOF_DETAILS"
          } | tee -a "$GITHUB_OUTPUT"

          if [ "$STATUS" != "success" ]; then
            exit 1
          fi

      - name: Workflow summary
        if: ${{ always() }}
        shell: bash
        env:
          VERIFY_STATUS: ${{ steps.verify-mkdocs.outcome || 'failure' }}
          VERIFY_SUMMARY: ${{ steps.verify-mkdocs.outputs.summary || 'MkDocs artifact verification did not run.' }}
          VERIFY_ERRORS: ${{ steps.verify-mkdocs.outputs.errors || '' }}
          VERIFY_DETAILS: ${{ steps.verify-mkdocs.outputs.details || '' }}
        run: |
          set -euo pipefail
          {
            echo "### mkdocs_site.yml verification"
            echo ""
            if [ "$VERIFY_STATUS" = "success" ]; then
              echo ":white_check_mark: $VERIFY_SUMMARY"
            else
              echo ":x: $VERIFY_SUMMARY"
            fi

            if [ -n "$VERIFY_ERRORS" ] || [ -n "$VERIFY_DETAILS" ]; then
              echo ""
              echo "<details><summary>Details</summary>"
              echo ""
              if [ -n "$VERIFY_ERRORS" ]; then
                echo "Errors:"
                echo '```text'
                printf '%s\n' "$VERIFY_ERRORS"
                echo '```'
                echo ""
              fi
              if [ -n "$VERIFY_DETAILS" ]; then
                echo "Extracted files:"
                echo '```text'
                printf '%s\n' "$VERIFY_DETAILS"
                echo '```'
              fi
              echo ""
              echo "</details>"
            fi
            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY"

          if [ "$VERIFY_STATUS" != "success" ]; then
            exit 1
          fi

  workflow-jekyll-site:
    permissions:
      contents: read
      pages: read
    uses: ./.github/workflows/jekyll_site.yml
    secrets: inherit
    with:
      source: tests/fixtures/jekyll_site
      artifact-name: github-pages-jekyll-test
      version: dev

  workflow-jekyll-site-verify:
    permissions:
      contents: read
    needs: [workflow-jekyll-site]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify Jekyll workflow result
        shell: bash
        env:
          WORKFLOW_RESULT: ${{ needs.workflow-jekyll-site.result }}
          SITE_HOST: ${{ needs.workflow-jekyll-site.outputs.host }}
          SITE_BASE_PATH: ${{ needs.workflow-jekyll-site.outputs.base-path }}
          SITE_BASE_URL: ${{ needs.workflow-jekyll-site.outputs.base-url }}
          SITE_VERSION: ${{ needs.workflow-jekyll-site.outputs.version }}
        run: |
          test "$WORKFLOW_RESULT" = "success"
          test -n "$SITE_HOST"
          test -n "$SITE_BASE_URL"
          test "$SITE_VERSION" = "dev"

      - name: Download Jekyll artifact
        uses: actions/download-artifact@v8
        with:
          name: github-pages-jekyll-test
          path: ./artifact

      - name: Verify Jekyll artifact contents
        id: verify-jekyll
        shell: bash
        run: |
          set -euo pipefail

          STATUS="success"
          SUMMARY="Jekyll artifact extracted successfully and includes the expected fixture content."
          ERRORS=()

          set_failure() {
            STATUS="failure"
            ERRORS+=("$1")
          }

          mkdir -p _site
          if [ -f ./artifact/artifact.tar ]; then
            tar --directory _site -xvf ./artifact/artifact.tar
          else
            TAR_FILE="$(find ./artifact -maxdepth 2 -type f -name '*.tar' | head -n1)"
            if [ -n "$TAR_FILE" ]; then
              tar --directory _site -xvf "$TAR_FILE"
            else
              cp -R ./artifact/. _site/
            fi
          fi

          test -f _site/index.html || set_failure "_site/index.html was missing"
          if [ -f _site/index.html ]; then
            grep -q "Jekyll Fixture" _site/index.html || set_failure "_site/index.html did not contain the expected fixture content"
          fi

          if [ "$STATUS" != "success" ]; then
            SUMMARY="Jekyll artifact verification failed."
          fi

          {
            echo "summary=$SUMMARY"
            echo "errors<<EOF_ERRORS"
            printf '%s\n' "${ERRORS[@]}"
            echo "EOF_ERRORS"
            echo "details<<EOF_DETAILS"
            find _site -maxdepth 2 -type f | sort
            echo "EOF_DETAILS"
          } | tee -a "$GITHUB_OUTPUT"

          if [ "$STATUS" != "success" ]; then
            exit 1
          fi

      - name: Workflow summary
        if: ${{ always() }}
        shell: bash
        env:
          VERIFY_STATUS: ${{ steps.verify-jekyll.outcome || 'failure' }}
          VERIFY_SUMMARY: ${{ steps.verify-jekyll.outputs.summary || 'Jekyll artifact verification did not run.' }}
          VERIFY_ERRORS: ${{ steps.verify-jekyll.outputs.errors || '' }}
          VERIFY_DETAILS: ${{ steps.verify-jekyll.outputs.details || '' }}
        run: |
          set -euo pipefail
          {
            echo "### jekyll_site.yml verification"
            echo ""
            if [ "$VERIFY_STATUS" = "success" ]; then
              echo ":white_check_mark: $VERIFY_SUMMARY"
            else
              echo ":x: $VERIFY_SUMMARY"
            fi

            if [ -n "$VERIFY_ERRORS" ] || [ -n "$VERIFY_DETAILS" ]; then
              echo ""
              echo "<details><summary>Details</summary>"
              echo ""
              if [ -n "$VERIFY_ERRORS" ]; then
                echo "Errors:"
                echo '```text'
                printf '%s\n' "$VERIFY_ERRORS"
                echo '```'
                echo ""
              fi
              if [ -n "$VERIFY_DETAILS" ]; then
                echo "Extracted files:"
                echo '```text'
                printf '%s\n' "$VERIFY_DETAILS"
                echo '```'
              fi
              echo ""
              echo "</details>"
            fi
            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY"

          if [ "$VERIFY_STATUS" != "success" ]; then
            exit 1
          fi

  workflow-site-output-consistency:
    permissions:
      contents: read
    needs:
      - workflow-mkdocs-site
      - workflow-jekyll-site
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Compare site workflow outputs
        shell: bash
        env:
          MKDOCS_RESULT: ${{ needs.workflow-mkdocs-site.result }}
          MKDOCS_HOST: ${{ needs.workflow-mkdocs-site.outputs.host }}
          MKDOCS_BASE_PATH: ${{ needs.workflow-mkdocs-site.outputs.base-path }}
          MKDOCS_BASE_URL: ${{ needs.workflow-mkdocs-site.outputs.base-url }}
          MKDOCS_VERSION: ${{ needs.workflow-mkdocs-site.outputs.version }}
          JEKYLL_RESULT: ${{ needs.workflow-jekyll-site.result }}
          JEKYLL_HOST: ${{ needs.workflow-jekyll-site.outputs.host }}
          JEKYLL_BASE_PATH: ${{ needs.workflow-jekyll-site.outputs.base-path }}
          JEKYLL_BASE_URL: ${{ needs.workflow-jekyll-site.outputs.base-url }}
          JEKYLL_VERSION: ${{ needs.workflow-jekyll-site.outputs.version }}
        run: |
          set -euo pipefail
          test "$MKDOCS_RESULT" = "success"
          test "$JEKYLL_RESULT" = "success"
          test "$MKDOCS_HOST" = "$JEKYLL_HOST"
          test "$MKDOCS_BASE_PATH" = "$JEKYLL_BASE_PATH"
          test "$MKDOCS_BASE_URL" = "$JEKYLL_BASE_URL"
          test "$MKDOCS_VERSION" = "$JEKYLL_VERSION"

  workflow-htmlproofer-site-fixture:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Upload HTMLProofer fixture artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-htmlproofer-test
          path: ./tests/fixtures/htmlproofer_site

  workflow-htmlproofer-site:
    permissions:
      contents: read
    needs: [workflow-htmlproofer-site-fixture]
    uses: ./.github/workflows/htmlproofer_site.yml
    with:
      artifact-name: github-pages-htmlproofer-test
      htmlproofer-ignore-urls: |
        /^https:\/\/example\.com$/

  workflow-deploy-site-fixture:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Upload deploy-site fixture artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-deploy-site-test
          path: ./tests/fixtures/htmlproofer_site

  workflow-deploy-site:
    permissions:
      contents: write
      pages: write
      id-token: write
    needs: [workflow-deploy-site-fixture]
    uses: ./.github/workflows/deploy_site.yml
    with:
      type: branch
      version: dev
      artifact-name: github-pages-deploy-site-test
      branch: ci-test/deploy-site-${{ github.run_id }}-${{ github.run_attempt }}
      dry-run: false

  workflow-deploy-site-verify-and-cleanup:
    permissions:
      contents: write
    needs: [workflow-deploy-site]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Verify deploy-site branch
        id: verify-deploy-site
        shell: bash
        env:
          WORKFLOW_RESULT: ${{ needs.workflow-deploy-site.result }}
          TEST_BRANCH: ci-test/deploy-site-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail

          STATUS="success"
          SUMMARY="deploy_site.yml published the expected branch content."
          ERRORS=()

          set_failure() {
            STATUS="failure"
            ERRORS+=("$1")
          }

          [ "$WORKFLOW_RESULT" = "success" ] || set_failure "deploy_site.yml result was $WORKFLOW_RESULT"
          git fetch origin "$TEST_BRANCH" --depth=1 || set_failure "Failed to fetch $TEST_BRANCH"
          test -n "$(git rev-parse --verify FETCH_HEAD)" || set_failure "FETCH_HEAD was empty"
          if git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
            git show "FETCH_HEAD:dev/index.html" | grep -q "<html" || set_failure "dev/index.html did not contain an HTML tag"
          fi

          if [ "$STATUS" != "success" ]; then
            SUMMARY="deploy_site.yml verification failed."
          fi

          {
            echo "summary=$SUMMARY"
            echo "errors<<EOF_ERRORS"
            printf '%s\n' "${ERRORS[@]}"
            echo "EOF_ERRORS"
            echo "details<<EOF_DETAILS"
            echo "$TEST_BRANCH"
            echo "EOF_DETAILS"
          } | tee -a "$GITHUB_OUTPUT"

          if [ "$STATUS" != "success" ]; then
            exit 1
          fi

      - name: Delete deploy-site test branch
        if: ${{ always() }}
        shell: bash
        env:
          TEST_BRANCH: ci-test/deploy-site-${{ github.run_id }}-${{ github.run_attempt }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          ENCODED_BRANCH="${TEST_BRANCH//\//%2F}"
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${ENCODED_BRANCH}" || true

      - name: Workflow summary
        if: ${{ always() }}
        shell: bash
        env:
          VERIFY_STATUS: ${{ steps.verify-deploy-site.outcome || 'failure' }}
          VERIFY_SUMMARY: ${{ steps.verify-deploy-site.outputs.summary || 'deploy_site.yml verification did not run.' }}
          VERIFY_ERRORS: ${{ steps.verify-deploy-site.outputs.errors || '' }}
          VERIFY_DETAILS: ${{ steps.verify-deploy-site.outputs.details || '' }}
        run: |
          set -euo pipefail
          {
            echo "### deploy_site.yml verification"
            echo ""
            if [ "$VERIFY_STATUS" = "success" ]; then
              echo ":white_check_mark: $VERIFY_SUMMARY"
            else
              echo ":x: $VERIFY_SUMMARY"
            fi

            if [ -n "$VERIFY_ERRORS" ] || [ -n "$VERIFY_DETAILS" ]; then
              echo ""
              echo "<details><summary>Details</summary>"
              echo ""
              if [ -n "$VERIFY_ERRORS" ]; then
                echo "Errors:"
                echo '```text'
                printf '%s\n' "$VERIFY_ERRORS"
                echo '```'
                echo ""
              fi
              if [ -n "$VERIFY_DETAILS" ]; then
                echo "Branch:"
                echo '```text'
                printf '%s\n' "$VERIFY_DETAILS"
                echo '```'
              fi
              echo ""
              echo "</details>"
            fi
            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY"

          if [ "$VERIFY_STATUS" != "success" ]; then
            exit 1
          fi

  workflow-release-draft:
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/release_drafter.yml
    with:
      dry-run: true

  workflow-release-draft-verify:
    permissions:
      contents: read
    needs: [workflow-release-draft]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify workflow release draft dry run
        shell: bash
        env:
          WORKFLOW_RESULT: ${{ needs.workflow-release-draft.result }}
          RELEASE_ID: ${{ needs.workflow-release-draft.outputs.id }}
          RESOLVED_VERSION: ${{ needs.workflow-release-draft.outputs.resolved-version }}
          CHANGELOG: ${{ needs.workflow-release-draft.outputs.changelog }}
        run: |
          set -euo pipefail
          test "$WORKFLOW_RESULT" = "success"
          test -z "$RELEASE_ID"
          test -n "$RESOLVED_VERSION"
          test -n "$CHANGELOG"
          {
            echo "### release_drafter.yml dry run"
            echo ""
            echo ":white_check_mark: Release Drafter resolved version $RESOLVED_VERSION and rendered a changelog."
          } | tee -a "$GITHUB_STEP_SUMMARY"

  workflow-ci-updater-fixture-branch:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      fixture-branch: ${{ steps.branch.outputs.fixture-branch }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Create ci_updater fixture branch
        id: branch
        shell: bash
        env:
          FIXTURE_BRANCH: ci-test/ci-updater-fixture-pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          FIXTURE_ANSWERS_PATH="$RUNNER_TEMP/ci-updater-fixture-answers.yml"
          cp tests/fixtures/ci_updater/.copier-answers.ci.yml "$FIXTURE_ANSWERS_PATH"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$FIXTURE_BRANCH" origin/main
          cp "$FIXTURE_ANSWERS_PATH" .copier-answers.ci.yml
          git add -f .copier-answers.ci.yml
          git commit -m "test: prepare ci_updater fixture"
          git push --force-with-lease origin "$FIXTURE_BRANCH"
          echo "fixture-branch=$FIXTURE_BRANCH" | tee -a "$GITHUB_OUTPUT"

  workflow-ci-updater:
    needs: [workflow-ci-updater-fixture-branch]
    permissions:
      contents: read
    uses: ./.github/workflows/ci_updater.yml
    with:
      dry-run: true
      checkout-ref: ${{ needs.workflow-ci-updater-fixture-branch.outputs.fixture-branch }}
      template-ref: ${{ github.head_ref }}

  workflow-ci-updater-verify-and-cleanup:
    permissions:
      contents: write
    needs: [workflow-ci-updater]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify ci_updater outputs
        id: verify-ci-updater-outputs
        shell: bash
        env:
          WORKFLOW_RESULT: ${{ needs.workflow-ci-updater.result }}
          CHANGED: ${{ needs.workflow-ci-updater.outputs.changed }}
          CHANGED_FILES: ${{ needs.workflow-ci-updater.outputs.changed-files }}
          BRANCH: ${{ needs.workflow-ci-updater.outputs.branch }}
          PR_URL: ${{ needs.workflow-ci-updater.outputs.pr-url }}
        run: |
          set -euo pipefail

          STATUS="success"
          SUMMARY="ci_updater.yml returned valid outputs."
          ERRORS=()

          set_failure() {
            STATUS="failure"
            ERRORS+=("$1")
          }

          [ "$WORKFLOW_RESULT" = "success" ] || set_failure "ci_updater.yml result was $WORKFLOW_RESULT"
          [ "$CHANGED" = "true" ] || set_failure "Expected the stale CI updater fixture to produce changes"
          grep -Fxq ".copier-answers.ci.yml" <<< "$CHANGED_FILES" || \
            set_failure "Missing the Copier answers fixture from changed-files"
          [ -z "$BRANCH" ] || set_failure "Expected an empty branch output during dry run"
          [ -z "$PR_URL" ] || set_failure "Expected an empty pr-url output during dry run"

          if [ "$STATUS" != "success" ]; then
            SUMMARY="ci_updater.yml returned invalid outputs."
          fi

          {
            echo "summary=$SUMMARY"
            echo "errors<<EOF_ERRORS"
            printf '%s\n' "${ERRORS[@]}"
            echo "EOF_ERRORS"
            echo "details<<EOF_DETAILS"
            echo "result: $WORKFLOW_RESULT"
            echo "changed: $CHANGED"
            echo "changed-files: $CHANGED_FILES"
            echo "branch: $BRANCH"
            echo "pr-url: $PR_URL"
            echo "EOF_DETAILS"
          } | tee -a "$GITHUB_OUTPUT"

          if [ "$STATUS" != "success" ]; then
            exit 1
          fi

      - name: Delete ci_updater fixture branch
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          FIXTURE_BRANCH: ci-test/ci-updater-fixture-pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          ENCODED_BRANCH="${FIXTURE_BRANCH//\//%2F}"
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${ENCODED_BRANCH}" || true

      - name: Workflow summary
        if: ${{ always() }}
        shell: bash
        env:
          CHANGED: ${{ needs.workflow-ci-updater.outputs.changed }}
          OUTPUTS_STATUS: ${{ steps.verify-ci-updater-outputs.outcome || 'failure' }}
          OUTPUTS_SUMMARY: ${{ steps.verify-ci-updater-outputs.outputs.summary || 'ci_updater.yml output verification did not run.' }}
          OUTPUTS_ERRORS: ${{ steps.verify-ci-updater-outputs.outputs.errors || '' }}
          OUTPUTS_DETAILS: ${{ steps.verify-ci-updater-outputs.outputs.details || '' }}
        run: |
          set -euo pipefail

          STATUS="success"
          SUMMARY="ci_updater.yml verification passed."
          if [ "$OUTPUTS_STATUS" != "success" ]; then
            STATUS="failure"
            SUMMARY="$OUTPUTS_SUMMARY"
          elif [ "$CHANGED" != "true" ]; then
            SUMMARY="ci_updater.yml reported no template changes."
          fi

          {
            echo "### ci_updater.yml verification"
            echo ""
            if [ "$STATUS" = "success" ]; then
              echo ":white_check_mark: $SUMMARY"
            else
              echo ":x: $SUMMARY"
            fi
            echo ""
            echo "<details><summary>Details</summary>"
            echo ""
            if [ -n "$OUTPUTS_DETAILS" ]; then
              echo "Outputs:"
              echo '```text'
              printf '%s\n' "$OUTPUTS_DETAILS"
              echo '```'
              echo ""
            fi
            if [ -n "$OUTPUTS_ERRORS" ]; then
              echo "Errors:"
              echo '```text'
              printf '%s\n' "$OUTPUTS_ERRORS"
              echo '```'
              echo ""
            fi
            echo "</details>"
            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY"

          if [ "$STATUS" != "success" ]; then
            exit 1
          fi

  workflows-success:
    if: ${{ always() }}
    needs:
      - workflow-validation
      - workflow-mkdocs-site-verify
      - workflow-jekyll-site-verify
      - workflow-site-output-consistency
      - workflow-htmlproofer-site
      - workflow-deploy-site-verify-and-cleanup
      - workflow-release-draft-verify
      - workflow-ci-updater-verify-and-cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate upstream job results
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          UNSUCCESSFUL_JOBS="$(jq -r '
            to_entries[]
            | select(.value.result != "success")
            | "\(.key): \(.value.result)"
          ' <<< "$NEEDS_JSON")"

          {
            echo "## Workflow Test Results"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            jq -r '
              to_entries[]
              | "| `\(.key)` | \(if .value.result == "success" then ":white_check_mark:" else ":x:" end) \(.value.result) |"
            ' <<< "$NEEDS_JSON"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$UNSUCCESSFUL_JOBS" ]; then
            echo "Workflow tests did not all pass:"
            printf '%s\n' "$UNSUCCESSFUL_JOBS"
            exit 1
          fi

          echo "All workflow tests passed."
