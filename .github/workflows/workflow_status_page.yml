name: Update Workflow Status Page

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview the generated status page without creating a pull request"
        required: false
        type: boolean
        default: true

concurrency:
  group: update-workflow-status-page
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  update-workflow-status-page:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Get gh rate limit before
        shell: bash
        run: |
          gh api graphql -f query='{ rateLimit { limit remaining resetAt cost } }'

      - name: Refresh workflow status page
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/generate_workflow_status.py \
            --owner athackst \
            --owner althack \
            --owner PrimerPages

      - name: Get gh rate limit after refresh
        shell: bash
        run: |
          gh api graphql -f query='{ rateLimit { limit remaining resetAt cost } }'

      - name: Preview workflow status page
        if: ${{ inputs.dry_run == true }}
        shell: bash
        run: |
          set -euo pipefail
          cat workflow_status.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update workflow status PR
        id: status-pr
        if: ${{ inputs.dry_run != true }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.CI_BOT_TOKEN }}
          add-paths: workflow_status.md
          branch: docs/refresh-workflow-status
          delete-branch: true
          commit-message: "docs: refresh workflow status page"
          title: "docs: refresh workflow status page"
          body: "Automated refresh of the public workflow status page."
          labels: automerge

      - name: Get gh rate limit after
        shell: bash
        run: |
          gh api graphql -f query='{ rateLimit { limit remaining resetAt cost } }'
