name: HTMLProofer Site

on:
  workflow_call:
    inputs:
      host:
        description: Site host for htmlproofer URL swapping (for example, user.github.io).
        type: string
        required: false
        default: ""
      base-path:
        description: Site base path for htmlproofer URL swapping (for example, /repo).
        type: string
        required: false
        default: ""
      htmlproofer-ignore-urls:
        description: Optional newline-delimited URLs or regexes to ignore.
        type: string
        required: false
        default: ""
      artifact-name:
        description: Artifact name containing built site content.
        type: string
        required: false
        default: "github-pages"

jobs:
  test-site:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: main/

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: ./artifact

      - name: Extract site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          if [ -f ./artifact/artifact.tar ]; then
            tar --directory _site -xvf ./artifact/artifact.tar
          else
            TAR_FILE="$(find ./artifact -maxdepth 2 -type f -name '*.tar' | head -n1)"
            if [ -n "$TAR_FILE" ]; then
              tar --directory _site -xvf "$TAR_FILE"
            else
              cp -R ./artifact/. _site/
            fi
          fi

      - name: Debug artifact contents
        shell: bash
        run: |
          echo "Working directory contents:"
          tree
          echo "Index contents:"
          cat _site/index.html

      - name: Build ignore URLs for htmlproofer
        id: build-ignore
        shell: bash
        run: |
          {
            echo "ignore_urls<<EOF"
            echo '/^https?://(www\.)?twitter\.com(/.*)?/'
            echo '/^https?://x\.com(/.*)?/'
            echo '/^https?://platform\.twitter\.com(/.*)?/'
            echo '/^https?://fonts\.googleapis\.com(/.*)?/'
            echo '/^https?://fonts\.gstatic\.com(/.*)?/'
            echo '/^https?://www\.flaticon\.com(/.*)?/'
            echo '/^https?://docs\.docker\.com(/.*)?/'
            echo '${{ inputs.htmlproofer-ignore-urls }}'
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Build swap URLS for htmlproofer
        id: build-swap
        shell: bash
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
          DEV_NAME: "dev"
          LATEST_NAME: "latest"
        run: |
          {
            echo "swap_urls<<EOF"
            echo "^\/${DEV_NAME}:"
            echo "^\/v[0-9]+\.[0-9]+\.[0-9]+:"
            echo "^\/${LATEST_NAME}:"
            echo "^https:\/\/(?:www\.)?github\.com\/${REPO_OWNER}\/${REPO_NAME}\/blob\/:file\:/${{ github.workspace }}/"
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Cache HTMLProofer
        uses: actions/cache@v5
        with:
          path: tmp/.htmlproofer
          key: ${{ runner.os }}-htmlproofer

      - name: Test with htmlproofer
        uses: athackst/htmlproofer-action@main
        with:
          max_concurrency: 10
          host: ${{ inputs.host }}
          base_path: ${{ inputs.base-path }}
          ignore_urls: ${{ steps.build-ignore.outputs.ignore_urls }}
          swap_urls: ${{ steps.build-swap.outputs.swap_urls }}

      - name: Save cache
        if: always()
        uses: actions/cache/save@v5
        with:
          key: ${{ runner.os }}-htmlproofer
          path: tmp/.htmlproofer
