name: Bump

on:
  workflow_call:
    inputs:
      configuration-path:
        description: Path to unified CI config file.
        type: string
        required: false
        default: ".github/ci-config.yml"
      bump-script:
        description: Optional script path to run after version resolution.
        type: string
        required: false
        default: ""
      push-branch:
        description: Optional branch override for pushing bump commits or opening bump PRs.
        type: string
        required: false
        default: ""
    outputs:
      changed:
        description: Whether the bump script produced changes that were prepared for push or a bump PR.
        value: ${{ jobs.pr-bump.outputs.changed }}
      version:
        description: Resolved version from the version resolver action, if any.
        value: ${{ jobs.pr-bump.outputs.resolved-version }}
      branch:
        description: Branch that received the bump commit or was used for the bump PR, if any.
        value: ${{ jobs.pr-bump.outputs.target-branch }}
    secrets:
      token:
        description: Optional token override for labeling, version resolution, and automerge.
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  pr-bump:
    if: ${{ inputs.bump-script != '' }}
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed || 'false' }}
      resolved-version: ${{ steps.version.outputs.resolved-version || '' }}
      target-branch: ${{ steps.bump-commit.outputs.target-branch || steps.bump-pr.outputs.pull-request-branch || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.token || github.token }}

      - name: Get configuration
        id: config
        continue-on-error: true
        uses: athackst/ci/actions/resolve-config@main
        with:
          configuration-path: ${{ inputs.configuration-path }}
          github-token: ${{ secrets.token || github.token }}

      - name: Resolve version metadata
        id: version
        if: ${{ inputs.bump-script != ''}}
        uses: athackst/ci/actions/version-resolver@main
        with:
          configuration-path: ${{ steps.config.outputs.config-path }}
          gh-token: ${{ secrets.token || github.token }}

      - name: Run bump script
        id: bump
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.resolved-version }}
          MAJOR_VERSION: ${{ steps.version.outputs.major-version }}
          MINOR_VERSION: ${{ steps.version.outputs.minor-version }}
          PATCH_VERSION: ${{ steps.version.outputs.patch-version }}
          PR_INFO_PATH: ${{ steps.version.outputs.pr-info-path }}
        run: |
          set -euo pipefail

          SCRIPT_PATH="${{ inputs.bump-script }}"
          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "Bump script not found: $SCRIPT_PATH"
            exit 1
          fi

          bash "$SCRIPT_PATH"

      - name: Commit updated files
        id: commit
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Bump script produced no changes."
            echo "changed=false" | tee -a "$GITHUB_OUTPUT"
            {
              echo "changed-files<<EOF"
              echo ""
              echo "EOF"
            } | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          git add -A
          CHANGED_FILES="$(git diff --cached --name-only)"

          {
            echo "changed=true"
            echo "changed-files<<EOF"
            printf '%s\n' "$CHANGED_FILES"
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: apply automated version bump"

      - name: Create or update bump PR
        id: bump-pr
        if: ${{ github.event_name != 'pull_request' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.token || github.token }}
          branch: ${{ inputs.push-branch || 'ci/pr-bump' }}
          commit-message: "chore: apply automated version bump"
          title: "chore: apply automated version bump"
          body: |
            Automated PR created by `pr_bump.yml`.

            Resolved version: `${{ steps.version.outputs.resolved-version || 'unknown' }}`
          labels: automerge, skip-changelog

      - name: Push commit
        id: bump-commit
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
          TARGET_BRANCH: ${{ inputs.push-branch || github.head_ref || github.ref_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$TARGET_BRANCH" ] || [ "$TARGET_BRANCH" = "HEAD" ]; then
            echo "Unable to resolve a valid target branch for commit push."
            exit 1
          fi
          echo "target-branch=$TARGET_BRANCH" | tee -a "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${TARGET_BRANCH}"
            git rebase "origin/${TARGET_BRANCH}"
          else
            echo "Remote branch ${TARGET_BRANCH} does not exist yet; pushing current HEAD to create it."
          fi
          git push origin "HEAD:refs/heads/${TARGET_BRANCH}"

      - name: Build PR bump comment body
        id: bump-comment
        if: ${{ github.event_name == 'pull_request' && steps.commit.outputs.changed == 'true' }}
        shell: bash
        env:
          TARGET_BRANCH: ${{ steps.bump-commit.outputs.target-branch || '' }}
          VERSION: ${{ steps.version.outputs.resolved-version || '' }}
          CHANGED_FILES: ${{ steps.commit.outputs.changed-files || '' }}
          MARKER: "<!-- ci:pr-bump -->"
        run: |
          set -euo pipefail
          {
            echo "marker=$MARKER"
            echo "body<<EOF"
            echo "$MARKER"
            printf '%s' "Applied automated version bump commit"
            if [ -n "${VERSION}" ]; then
              printf " for \`%s\`" "${VERSION}"
            fi
            if [ -n "${TARGET_BRANCH}" ]; then
              printf " on branch \`%s\`" "${TARGET_BRANCH}"
            fi
            echo "."
            if [ -n "${CHANGED_FILES}" ]; then
              echo
              echo "Changed files:"
              echo '```text'
              printf '%s\n' "${CHANGED_FILES}"
              echo '```'
            fi
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Find existing PR bump comment
        id: find-bump-comment
        if: ${{ github.event_name == 'pull_request' && steps.commit.outputs.changed == 'true' }}
        uses: peter-evans/find-comment@v4
        with:
          token: ${{ secrets.token || github.token }}
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: ${{ steps.bump-comment.outputs.marker }}

      - name: Create or update PR bump comment
        if: ${{ github.event_name == 'pull_request' && steps.commit.outputs.changed == 'true' }}
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.token || github.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-bump-comment.outputs.comment-id }}
          body: ${{ steps.bump-comment.outputs.body }}
          edit-mode: replace

      - name: Workflow summary
        if: ${{ always() }}
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          BUMP_SCRIPT: ${{ inputs.bump-script }}
          CHANGED: ${{ steps.commit.outputs.changed || 'false' }}
          TARGET_BRANCH: ${{ steps.bump-commit.outputs.target-branch || steps.bump-pr.outputs.pull-request-branch }}
          CHANGED_FILES: ${{ steps.commit.outputs.changed-files || '' }}
          FROM_REF: ${{ steps.version.outputs.from-ref }}
          VERSION: ${{ steps.version.outputs.resolved-version }}
          MAJOR_VERSION: ${{ steps.version.outputs.major-version }}
          MINOR_VERSION: ${{ steps.version.outputs.minor-version }}
          PATCH_VERSION: ${{ steps.version.outputs.patch-version }}
          BUMP_PR_NUMBER: ${{ steps.bump-pr.outputs.pull-request-number || '' }}
          BUMP_PR_OPERATION: ${{ steps.bump-pr.outputs.pull-request-operation || '' }}
        run: |
          set -euo pipefail

          {
            echo "### PR Bump"
            echo ""

            if [ -n "${VERSION}" ]; then
              if [ "${CHANGED}" = "true" ]; then
                if [ "${{ github.event_name }}" = "pull_request" ]; then
                  echo ":white_check_mark: Bump commit was created and pushed."
                elif [ -n "${BUMP_PR_NUMBER}" ]; then
                  echo ":white_check_mark: Bump PR #${BUMP_PR_NUMBER} was ${BUMP_PR_OPERATION:-created or updated}."
                else
                  echo ":x: Changes were not committed"
                fi
              else
                echo ":information_source: Bump script ran but produced no changes."
              fi
              echo ""
              echo "from-ref: \`${FROM_REF}\`"
              echo "target-branch: \`${TARGET_BRANCH}\`"
              echo "resolved-version: \`${VERSION}\`"
              echo "version-parts: \`${MAJOR_VERSION}.${MINOR_VERSION}.${PATCH_VERSION}\`"
              if [ -n "${CHANGED_FILES}" ]; then
                echo ""
                echo "changed-files:"
                echo '```text'
                printf '%s\n' "${CHANGED_FILES}"
                echo '```'
              fi
            else
              echo ":grey_question: Version metadata was not resolved."
            fi

            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
