name: CI Update Dispatch

on:
  push:
    branches: [main]
    paths:
      - "copier.yml"
      - "template/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry Run: Check matches without sending dispatch events'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-template-dispatch
  cancel-in-progress: false

jobs:
  repository-dispatch:
    runs-on: ubuntu-latest
    outputs:
      checked: ${{ steps.dispatch.outputs.checked }}
      matched: ${{ steps.dispatch.outputs.matched }}
      dispatched: ${{ steps.dispatch.outputs.dispatched }}
      changes: ${{ steps.changes.outputs.paths }}
    steps:
      - uses: actions/checkout@v6
        if: ${{ github.event_name == 'push' }}
        with:
          fetch-depth: 2

      - name: Compute changed paths
        id: changes
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          set -euo pipefail
          CHANGED="$(
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" || true
          )"
          FILTERED="$(
            printf '%s\n' "$CHANGED" \
              | grep -E '^template/' \
              || true
          )"
          {
            echo "paths<<EOF"
            printf '%s\n' "$FILTERED"
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Dispatch ci updates to authorized repositories
        id: dispatch
        uses: actions/github-script@v8
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          EVENT_TYPE: 'ci-update'
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const currentRepo = context.repo.repo;
            const dryRun = process.env.DRY_RUN === 'true';
            const eventType = process.env.EVENT_TYPE || 'ci-update';
            const matchPaths = ['.copier-answers.ci.yml'];

            async function hasAnyMatch(repo) {
              for (const path of matchPaths) {
                try {
                  await github.rest.repos.getContent({ owner, repo, path });
                  return true;
                } catch (error) {
                  if (error.status !== 404) {
                    throw error;
                  }
                }
              }

              return false;
            }

            const repos = await github.paginate(
              github.rest.apps.listReposAccessibleToInstallation,
              { per_page: 100 },
            );

            let checked = 0;
            let matched = 0;
            let dispatched = 0;

            for (const repoInfo of repos) {
              const repo = repoInfo.name;
              if (repo === currentRepo) {
                continue;
              }

              checked += 1;

              if (!(await hasAnyMatch(repo))) {
                continue;
              }

              matched += 1;

              if (dryRun) {
                continue;
              }

              await github.request('POST /repos/{owner}/{repo}/dispatches', {
                owner,
                repo,
                event_type: eventType,
              });
              dispatched += 1;
            }

            core.setOutput('checked', String(checked));
            core.setOutput('matched', String(matched));
            core.setOutput('dispatched', String(dispatched));

      - name: Workflow summary
        if: ${{ always() }}
        shell: bash
        env:
          DISPATCH_RESULT: ${{ steps.dispatch.outcome }}
          CHECKED: ${{ steps.dispatch.outputs.checked || '0' }}
          MATCHED: ${{ steps.dispatch.outputs.matched || '0' }}
          DISPATCHED: ${{ steps.dispatch.outputs.dispatched || '0' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          CHANGED_PATHS: ${{ steps.changes.outputs.paths || '' }}
        run: |
          set -euo pipefail
          {
            echo "### CI Template Dispatch"
            echo ""
            echo "- dispatch-result: \`${DISPATCH_RESULT}\`"
            echo "- repositories-checked: \`${CHECKED}\`"
            echo "- repositories-matched: \`${MATCHED}\`"
            if [ "${DRY_RUN}" = "true" ]; then
              echo "- dispatches-skipped-dry-run: \`${MATCHED}\`"
            else
              echo "- dispatches-sent: \`${DISPATCHED}\`"
            fi
            echo ""
            if [ -n "${CHANGED_PATHS}" ]; then
              echo "<details><summary>Changed paths</summary>"
              echo ""
              echo '```text'
              printf '%s\n' "$CHANGED_PATHS"
              echo '```'
              echo ""
              echo "</details>"
              echo ""
            fi
          } >> "$GITHUB_STEP_SUMMARY"
