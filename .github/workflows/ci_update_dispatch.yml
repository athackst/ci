name: CI Update Dispatch

on:
  push:
    branches: [main]
    paths:
      - "copier.yml"
      - "template/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry Run: Check matches without sending dispatch events'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ci-template-dispatch
  cancel-in-progress: false

jobs:
  repository-dispatch:
    runs-on: ubuntu-latest
    outputs:
      checked: ${{ steps.dispatch.outputs.checked }}
      matched: ${{ steps.dispatch.outputs.matched }}
      dispatched: ${{ steps.dispatch.outputs.dispatched }}
      changes: ${{ steps.changes.outputs.paths }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Compute changed paths
        id: changes
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          set -euo pipefail
          CHANGED="$(
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" || true
          )"
          FILTERED="$(
            printf '%s\n' "$CHANGED" \
              | grep -E '^template/' \
              || true
          )"
          {
            echo "paths<<EOF"
            printf '%s\n' "$FILTERED"
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: List managed repositories
        id: repos
        uses: ./actions/list-repos
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          user: ${{ github.repository_owner }}
          filter-paths: |
            .copier-answers.ci.yml
          output-path: .github/repositories.json

      - name: Refresh workflow status page
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/generate_workflow_status.py --repos-file "${{ steps.repos.outputs.repository-file }}"

      - name: Create or update workflow status PR
        id: status-pr
        if: ${{ inputs.dry_run != true }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.CI_BOT_TOKEN }}
          add-paths: docs/workflow_status.md
          branch: docs/refresh-workflow-status
          delete-branch: true
          commit-message: "docs: refresh workflow status page"
          title: "docs: refresh workflow status page"
          body: "Automated refresh of the public workflow status page."
          labels: automerge

      - name: Dispatch ci updates to authorized repositories
        id: dispatch
        uses: actions/github-script@v8
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          EVENT_TYPE: 'ci-update'
          REPOS_FILE: ${{ steps.repos.outputs.repository-file }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const dryRun = process.env.DRY_RUN === 'true';
            const eventType = process.env.EVENT_TYPE || 'ci-update';
            const repos = JSON.parse(fs.readFileSync(process.env.REPOS_FILE, 'utf8'));

            const checked = repos.length;
            const matched = repos.length;
            let dispatched = 0;

            for (const repoInfo of repos) {
              if (dryRun) {
                continue;
              }

              await github.request('POST /repos/{owner}/{repo}/dispatches', {
                owner,
                repo: repoInfo.name,
                event_type: eventType,
              });
              dispatched += 1;
            }

            core.setOutput('checked', String(checked));
            core.setOutput('matched', String(matched));
            core.setOutput('dispatched', String(dispatched));

      - name: Workflow summary
        if: ${{ always() }}
        shell: bash
        env:
          DISPATCH_RESULT: ${{ steps.dispatch.outcome }}
          CHECKED: ${{ steps.dispatch.outputs.checked || '0' }}
          MATCHED: ${{ steps.dispatch.outputs.matched || '0' }}
          DISPATCHED: ${{ steps.dispatch.outputs.dispatched || '0' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          STATUS_PR: ${{ steps.status-pr.outputs.pull-request-url || '' }}
          CHANGED_PATHS: ${{ steps.changes.outputs.paths || '' }}
        run: |
          set -euo pipefail
          {
            echo "### CI Template Dispatch"
            echo ""
            echo "- dispatch-result: ${DISPATCH_RESULT}"
            echo "- repositories-checked: ${CHECKED}"
            echo "- repositories-matched: ${MATCHED}"
            if [ -n "${STATUS_PR}" ]; then
              echo "- workflow-status-pr: ${STATUS_PR}"
            fi
            if [ "${DRY_RUN}" = "true" ]; then
              echo "- dispatches-skipped-dry-run: ${MATCHED}"
            else
              echo "- dispatches-sent: ${DISPATCHED}"
            fi
            echo ""
            if [ -n "${CHANGED_PATHS}" ]; then
              echo "<details><summary>Changed paths</summary>"
              echo ""
              echo '```text'
              printf "%s\n" "$CHANGED_PATHS"
             echo '```'
              echo ""
              echo "</details>"
              echo ""
            fi
          } >> "$GITHUB_STEP_SUMMARY"
