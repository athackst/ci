name: Test Actions

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: "test-actions-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  actions-unit-tests:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install Python test dependencies
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml

      - name: Run action unit tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t TEST_FILES < <(find actions -type f -path "*/tests/test_*.py" | sort)
          if [ "${#TEST_FILES[@]}" -eq 0 ]; then
            echo "No action unit tests found."
            {
              echo "### Action unit tests"
              echo ""
              echo "No action unit tests found."
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "### Action unit tests"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          ALL_STATUS=0

          for test_file in "${TEST_FILES[@]}"; do
            echo "Running $test_file"
            set +e
            TEST_OUTPUT="$(python3 -m unittest "$test_file" 2>&1)"
            TEST_STATUS=$?
            ALL_STATUS=$((ALL_STATUS + TEST_STATUS))
            set -e
            echo "$TEST_OUTPUT"
            if [ "$TEST_STATUS" -eq 0 ]; then
              TEST_STATUS_EMOJI=":white_check_mark:"
            else
              TEST_STATUS_EMOJI=":x:"
            fi

            {
              echo "<details><summary>$TEST_STATUS_EMOJI $test_file</summary>"
              echo ""
              echo '```text'
              echo "$TEST_OUTPUT"
              echo '```'
              echo ""
              echo "</details>"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          done
          
          exit "$ALL_STATUS"

  actions-copier-update:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install Bats
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run copier-update with missing answers file
        id: copier-update
        continue-on-error: true
        uses: ./actions/copier-update
        with:
          answers-file: missing-copier-answers.yml

      - name: Verify copier-update failure outputs
        shell: bash
        env:
          ACTION_OUTCOME: ${{ steps.copier-update.outcome }}
          ANSWERS_FOUND: ${{ steps.copier-update.outputs.answers-found }}
          COPIER_COMMAND: ${{ steps.copier-update.outputs.command }}
          CHANGED: ${{ steps.copier-update.outputs.changed }}
          CHANGED_FILES: ${{ steps.copier-update.outputs.changed-files }}
          CONFLICTS_FOUND: ${{ steps.copier-update.outputs.conflicts-found }}
          CONFLICTED_FILES: ${{ steps.copier-update.outputs.conflicted-files }}
        run: |
          set -euo pipefail

          [ "$ACTION_OUTCOME" = "failure" ]
          [ "$ANSWERS_FOUND" = "false" ]
          [ -z "$COPIER_COMMAND" ]
          [ "$CHANGED" = "false" ]
          [ -z "$CHANGED_FILES" ]
          [ "$CONFLICTS_FOUND" = "false" ]
          [ -z "$CONFLICTED_FILES" ]

          {
            echo "### Copier update action"
            echo ""
            echo ":white_check_mark: Missing answers file produced the expected failure and outputs."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create successful Copier update fixture
        shell: bash
        run: |
          set -euo pipefail

          TEMPLATE_DIR="$RUNNER_TEMP/copier-update-template"
          mkdir -p "$TEMPLATE_DIR/template"

          cat > "$TEMPLATE_DIR/copier.yml" <<'EOF'
          _subdirectory: template
          _answers_file: .copier-answers.test.yml
          project_name:
            type: str
            default: fixture
          EOF

          cat > "$TEMPLATE_DIR/template/message.txt.jinja" <<'EOF'
          message: baseline
          project: {{ project_name }}
          EOF

          cat > "$TEMPLATE_DIR/template/{{ _copier_conf.answers_file }}.jinja" <<'EOF'
          # Changes here will be overwritten by Copier; NEVER EDIT MANUALLY
          {{ _copier_answers|to_nice_yaml -}}
          EOF

          git -C "$TEMPLATE_DIR" init --quiet --initial-branch=main
          git -C "$TEMPLATE_DIR" config user.name "CI Test"
          git -C "$TEMPLATE_DIR" config user.email "ci-test@example.com"
          git -C "$TEMPLATE_DIR" add .
          git -C "$TEMPLATE_DIR" commit --quiet -m "Create baseline template"
          git -C "$TEMPLATE_DIR" tag v1.0.0

          cat > message.txt <<'EOF'
          message: baseline
          project: fixture
          EOF
          cat > .copier-answers.test.yml <<EOF
          # Changes here will be overwritten by Copier; NEVER EDIT MANUALLY
          _commit: v1.0.0
          _src_path: $TEMPLATE_DIR
          project_name: fixture
          EOF
          git config user.name "CI Test"
          git config user.email "ci-test@example.com"
          git add message.txt .copier-answers.test.yml
          git commit --quiet -m "Create Copier consumer fixture"

          cat > "$TEMPLATE_DIR/template/message.txt.jinja" <<'EOF'
          message: updated
          project: {{ project_name }}
          EOF
          git -C "$TEMPLATE_DIR" add .
          git -C "$TEMPLATE_DIR" commit --quiet -m "Update template message"
          git -C "$TEMPLATE_DIR" tag v1.1.0

      - name: Run successful copier-update
        id: successful-copier-update
        uses: ./actions/copier-update
        with:
          answers-file: .copier-answers.test.yml
          vcs-ref: v1.1.0

      - name: Verify successful copier-update outputs
        shell: bash
        env:
          ANSWERS_FOUND: ${{ steps.successful-copier-update.outputs.answers-found }}
          COPIER_COMMAND: ${{ steps.successful-copier-update.outputs.command }}
          CHANGED: ${{ steps.successful-copier-update.outputs.changed }}
          CHANGED_FILES: ${{ steps.successful-copier-update.outputs.changed-files }}
          CONFLICTS_FOUND: ${{ steps.successful-copier-update.outputs.conflicts-found }}
          CONFLICTED_FILES: ${{ steps.successful-copier-update.outputs.conflicted-files }}
        run: |
          set -euo pipefail

          [ "$ANSWERS_FOUND" = "true" ]
          [[ "$COPIER_COMMAND" == *"--vcs-ref v1.1.0"* ]]
          [ "$CHANGED" = "true" ]
          grep -Fqx "message.txt" <<< "$CHANGED_FILES"
          grep -Fqx ".copier-answers.test.yml" <<< "$CHANGED_FILES"
          [ "$CONFLICTS_FOUND" = "false" ]
          [ -z "$CONFLICTED_FILES" ]
          grep -Fqx "message: updated" message.txt
          grep -Fq "_commit: v1.1.0" .copier-answers.test.yml

      - name: Test copier-update with fixtures
        shell: bash
        run: |
          bats actions/copier-update/tests/copier_update.bats

  actions-copier-copy:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Install Bats
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run successful copier-copy
        id: copier-copy
        uses: ./actions/copier-copy
        with:
          destination: tests/generated/copier-copy-action
          answers-file: .copier-answers.test.yml
          vcs-ref: HEAD

      - name: Verify successful copier-copy outputs
        shell: bash
        env:
          COPIER_COMMAND: ${{ steps.copier-copy.outputs.command }}
          CHANGED: ${{ steps.copier-copy.outputs.changed }}
          CHANGED_FILES: ${{ steps.copier-copy.outputs.changed-files }}
        run: |
          set -euo pipefail

          [ "$CHANGED" = "true" ]
          [[ "$COPIER_COMMAND" == *"--overwrite"* ]]
          [[ "$COPIER_COMMAND" == *"--answers-file .copier-answers.test.yml"* ]]
          [[ "$COPIER_COMMAND" == *"--vcs-ref HEAD"* ]]
          grep -Fqx "tests/generated/copier-copy-action/.copier-answers.test.yml" <<< "$CHANGED_FILES"
          [ -f tests/generated/copier-copy-action/.copier-answers.test.yml ]

      - name: Test copier-copy with fixtures
        shell: bash
        run: |
          bats actions/copier-copy/tests/copier_copy.bats

  actions-setup-labels:
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Create setup-labels test config
        id: test-config
        shell: bash
        run: |
          set -euo pipefail

          TEST_SCOPE="${{ github.event.pull_request.number || github.run_id }}"
          LABEL_ONE="ci-setup-labels-${TEST_SCOPE}-one"
          LABEL_TWO="ci-setup-labels-${TEST_SCOPE}-two"
          CONFIG_PATH="$RUNNER_TEMP/setup-labels-test.yml"

          {
            echo "labels:"
            echo "  $LABEL_ONE:"
            echo "    - description: \"CI setup-labels integration test label one\""
            echo "    - color: \"1d4ed8\""
            echo "  $LABEL_TWO:"
            echo "    - description: \"CI setup-labels integration test label two\""
            echo "    - color: \"047857\""
          } > "$CONFIG_PATH"

          {
            echo "config-path=$CONFIG_PATH"
            echo "label-one=$LABEL_ONE"
            echo "label-two=$LABEL_TWO"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Run setup-labels action
        id: setup-labels
        uses: ./actions/setup-labels
        with:
          github-token: ${{ github.token }}
          configuration-path: ${{ steps.test-config.outputs.config-path }}

      - name: Verify setup-labels result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL_ONE: ${{ steps.test-config.outputs.label-one }}
          LABEL_TWO: ${{ steps.test-config.outputs.label-two }}
          CREATED_LABELS: ${{ steps.setup-labels.outputs.created-labels }}
          UPDATED_LABELS: ${{ steps.setup-labels.outputs.updated-labels }}
          UNCHANGED_LABELS: ${{ steps.setup-labels.outputs.unchanged-labels }}
          SKIPPED_LABELS: ${{ steps.setup-labels.outputs.skipped-labels }}
        run: |
          set -euo pipefail

          LABEL_ONE_JSON="$(gh api "repos/${{ github.repository }}/labels/${LABEL_ONE}")"
          LABEL_TWO_JSON="$(gh api "repos/${{ github.repository }}/labels/${LABEL_TWO}")"

          [ "$(jq -r '.color' <<< "$LABEL_ONE_JSON")" = "1d4ed8" ] || { echo "Unexpected color for $LABEL_ONE"; exit 1; }
          [ "$(jq -r '.description' <<< "$LABEL_ONE_JSON")" = "CI setup-labels integration test label one" ] || { echo "Unexpected description for $LABEL_ONE"; exit 1; }
          [ "$(jq -r '.color' <<< "$LABEL_TWO_JSON")" = "047857" ] || { echo "Unexpected color for $LABEL_TWO"; exit 1; }
          [ "$(jq -r '.description' <<< "$LABEL_TWO_JSON")" = "CI setup-labels integration test label two" ] || { echo "Unexpected description for $LABEL_TWO"; exit 1; }

          {
            echo "### Setup-labels outputs"
            echo ""
            echo "- created-labels: \`$CREATED_LABELS\` "
            echo "- updated-labels: \`$UPDATED_LABELS\` "
            echo "- unchanged-labels: \`$UNCHANGED_LABELS\` "
            echo "- skipped-labels: \`$SKIPPED_LABELS\` "
            echo ""
            echo ":white_check_mark: Verified label metadata for \`$LABEL_ONE\` and \`$LABEL_TWO\`."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup setup-labels test labels
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL_ONE: ${{ steps.test-config.outputs.label-one }}
          LABEL_TWO: ${{ steps.test-config.outputs.label-two }}
        run: |
          set -euo pipefail
          gh api -X DELETE "repos/${{ github.repository }}/labels/${LABEL_ONE}" || true
          gh api -X DELETE "repos/${{ github.repository }}/labels/${LABEL_TWO}" || true
          
  actions-pr-labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Check PR labeler changes
        id: changes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RUN_TEST=false
          while IFS= read -r path; do
            case "$path" in
              actions/pr-labeler/*)
                RUN_TEST=true
                break
                ;;
            esac
          done < <(
            gh api --paginate \
              "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
              --jq '.[].filename'
          )

          echo "run=$RUN_TEST" | tee -a "$GITHUB_OUTPUT"

      - name: Set configuration path
        if: ${{ steps.changes.outputs.run == 'true' }}
        id: config
        shell: bash
        run: |
          echo "path=./tests/fixtures/test-labeler.yml" | tee -a "$GITHUB_OUTPUT"

      - name: Read expected labels from config
        if: ${{ steps.changes.outputs.run == 'true' }}
        id: expected
        shell: bash
        run: |
          EXPECTED_LABELS_JSON="$(python3 .github/scripts/get_expected_labels.py "${{ steps.config.outputs.path }}")"
          echo "labels-json=$EXPECTED_LABELS_JSON" | tee -a "$GITHUB_OUTPUT"

      - name: Pre-clean expected labels
        if: ${{ steps.changes.outputs.run == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_LABELS_JSON: ${{ steps.expected.outputs.labels-json }}
        run: |
          set -euo pipefail
          echo "Pre-clean labels on PR #${{ github.event.pull_request.number }}"
          jq -r '.[]' <<< "$EXPECTED_LABELS_JSON" | while IFS= read -r label; do
            echo "Removing label: $label"
            gh pr edit ${{ github.event.pull_request.number }} --remove-label "$label" || echo "...Skip: $label not present"
          done

      - name: Run PR labeler action
        if: ${{ steps.changes.outputs.run == 'true' }}
        uses: ./actions/pr-labeler
        id: labeler
        with:
          configuration-path: ${{ steps.config.outputs.path }}

      - name: Install bats
        if: ${{ steps.changes.outputs.run == 'true' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Get PR labels after action
        if: ${{ steps.changes.outputs.run == 'true' }}
        id: actual
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_LABELS_JSON: ${{ steps.expected.outputs.labels-json }}
        run: |
          set -euo pipefail
          PR_NUMBER="${{ github.event.pull_request.number }}"
          # Poll with backoff to reduce rate-limit pressure and avoid timing flakes.
          for sleep_seconds in 1 2 4 8 16 24 48 96; do
            ACTUAL_LABELS_JSON="$(gh pr view "$PR_NUMBER" --json labels --jq '.labels | map(.name)')"
            MISSING_COUNT="$(
              jq -n \
                --argjson expected "$EXPECTED_LABELS_JSON" \
                --argjson actual "$ACTUAL_LABELS_JSON" \
                '$expected | map(select(. as $l | ($actual | index($l) | not))) | length'
            )"
            if [ "$MISSING_COUNT" -eq 0 ]; then
              break
            fi
            echo "Expected labels not visible yet; retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done
          echo "actual-labels-json=$ACTUAL_LABELS_JSON" | tee -a "$GITHUB_OUTPUT"

      - name: Check PR label assertion
        if: ${{ steps.changes.outputs.run == 'true' }}
        id: check_labels
        shell: bash
        env:
          NEW_LABELS: ${{ steps.labeler.outputs.new-labels }}
          ACTUAL_LABELS_JSON: ${{ steps.actual.outputs.actual-labels-json }}
          EXPECTED_LABELS_JSON: ${{ steps.expected.outputs.labels-json }}
        run: |
          set +e
          BATS_OUTPUT="$(bats actions/pr-labeler/tests/pr_labeler_assertion.bats 2>&1)"
          BATS_STATUS=$?
          TEST_SUMMARY="PR label assertion"
          if [ "$BATS_STATUS" -eq 0 ]; then
            TEST_SUMMARY=":white_check_mark: $TEST_SUMMARY passed."
          else
            TEST_SUMMARY=":x: $TEST_SUMMARY failed."
          fi
          echo "$TEST_SUMMARY"

          EXPECTED_COUNT="$(jq 'length' <<< "$EXPECTED_LABELS_JSON")"
          ACTUAL_COUNT="$(jq 'length' <<< "$ACTUAL_LABELS_JSON")"

          set -e
          {
            echo "### Action labeler results"
            echo ""
            echo "New labels added by action:"
            echo ""
            echo '```text'
            echo "${NEW_LABELS:-<none>}"
            echo '```'
            echo ""
            echo "<details><summary>Expected labels ($EXPECTED_COUNT)</summary>"
            echo ""
            echo '```json'
            jq . <<< "$EXPECTED_LABELS_JSON"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "<details><summary>Actual labels ($ACTUAL_COUNT)</summary>"
            echo ""
            echo '```json'
            jq . <<< "$ACTUAL_LABELS_JSON"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "<details><summary>$TEST_SUMMARY</summary>"
            echo ""
            echo '```text'
            echo "$BATS_OUTPUT"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$BATS_STATUS"

      - name: Remove PR labeler test labels
        if: ${{ always() && steps.changes.outputs.run == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_LABELS_JSON: ${{ steps.expected.outputs.labels-json }}
        run: |
          set -euo pipefail

          jq -r '.[]' <<< "$EXPECTED_LABELS_JSON" | while IFS= read -r label; do
            echo "Removing test label: $label"
            gh pr edit ${{ github.event.pull_request.number }} --remove-label "$label" || echo "...Skip: $label not present"
          done

      - name: Restore repository PR labels
        if: ${{ always() && steps.changes.outputs.run == 'true' }}
        uses: athackst/ci/actions/pr-labeler@main
        with:
          configuration-path: .github/ci-config.yml


  actions-configure-site:
    permissions:
      contents: read
      pages: read

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Test configure site action
        id: site
        uses: ./actions/configure-site
        with:
          host: https://docs.example.com/
          base-path: project/
          version: /dev/

      - name: Verify configure site outputs
        shell: bash
        env:
          SITE_HOST: ${{ steps.site.outputs.host }}
          SITE_BASE_PATH: ${{ steps.site.outputs.base-path }}
          SITE_BASE_URL: ${{ steps.site.outputs.base-url }}
          SITE_VERSION: ${{ steps.site.outputs.version }}
        run: |
          set -euo pipefail
          test "$SITE_HOST" = "docs.example.com"
          test "$SITE_BASE_PATH" = "/project"
          test "$SITE_BASE_URL" = "https://docs.example.com/project"
          test "$SITE_VERSION" = "dev"

      - name: Test GitHub Pages site settings
        id: pages-site
        uses: ./actions/configure-site

      - name: Verify GitHub Pages site settings
        shell: bash
        env:
          SITE_HOST: ${{ steps.pages-site.outputs.host }}
          SITE_BASE_URL: ${{ steps.pages-site.outputs.base-url }}
        run: |
          set -euo pipefail
          test -n "$SITE_HOST"
          test -n "$SITE_BASE_URL"

      - name: Test incomplete explicit site settings
        id: incomplete-site
        continue-on-error: true
        uses: ./actions/configure-site
        with:
          base-path: /project

      - name: Verify incomplete site settings failure
        shell: bash
        env:
          ACTION_OUTCOME: ${{ steps.incomplete-site.outcome }}
        run: test "$ACTION_OUTCOME" = "failure"

  actions-mkdocs-config:
    permissions:
      contents: read

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Test mkdocs config action
        uses: ./actions/mkdocs-config

      - name: Install bats
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Verify mkdocs config artifacts (bats)
        shell: bash
        run: |
          set +e
          BATS_OUTPUT="$(bats actions/mkdocs-config/tests/mkdocs_config.bats 2>&1)"
          BATS_STATUS=$?
          set -e
          TEST_SUMMARY="MkDocs config action test"
          if [ "$BATS_STATUS" -eq 0 ]; then
            TEST_SUMMARY=":white_check_mark: $TEST_SUMMARY passed."
          else
            TEST_SUMMARY=":x: $TEST_SUMMARY failed."
          fi
          echo "$TEST_SUMMARY"

          echo "$BATS_OUTPUT"

          {
            echo "### mkdocs-config action test"
            echo ""
            echo "<details><summary>$TEST_SUMMARY</summary>"
            echo ""
            echo '```text'
            echo "$BATS_OUTPUT"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$BATS_STATUS"

  actions-jekyll-config:
    permissions:
      contents: read

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install Jekyll config test dependencies
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml

      - name: Test jekyll config action
        id: jekyll-config
        uses: ./actions/jekyll-config
        with:
          title: CI Test Site
          description: Test description for Jekyll config
          image: https://example.com/site-preview.png
          edit_url: https://example.com/edit/

      - name: Verify jekyll config outputs
        shell: bash
        env:
          GEMFILE_PATH: ${{ steps.jekyll-config.outputs.gemfile-path }}
          CONFIG_PATH: ${{ steps.jekyll-config.outputs.config-path }}
          SEMILITERATE_CONFIG_PATH: ${{ steps.jekyll-config.outputs.semiliterate-config-path }}
        run: |
          set -euo pipefail
          [ "$GEMFILE_PATH" = "./Gemfile" ]
          [ "$CONFIG_PATH" = "./_config.yml" ]
          [ "$SEMILITERATE_CONFIG_PATH" = "./semiliterate.yml" ]

      - name: Install bats
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Verify jekyll config artifacts (bats)
        shell: bash
        run: |
          set +e
          BATS_OUTPUT="$(bats actions/jekyll-config/tests/jekyll_config.bats 2>&1)"
          BATS_STATUS=$?
          set -e
          TEST_SUMMARY="Jekyll config action test"
          if [ "$BATS_STATUS" -eq 0 ]; then
            TEST_SUMMARY=":white_check_mark: $TEST_SUMMARY passed."
          else
            TEST_SUMMARY=":x: $TEST_SUMMARY failed."
          fi
          echo "$TEST_SUMMARY"

          echo "$BATS_OUTPUT"

          {
            echo "### jekyll-config action test"
            echo ""
            echo "<details><summary>$TEST_SUMMARY</summary>"
            echo ""
            echo '```text'
            echo "$BATS_OUTPUT"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$BATS_STATUS"

  actions-success:
    needs:
      - actions-unit-tests
      - actions-pr-labeler
      - actions-configure-site
      - actions-mkdocs-config
      - actions-jekyll-config
      - actions-setup-labels
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate upstream job results
        shell: bash
        run: |
          echo "All action tests passed."
