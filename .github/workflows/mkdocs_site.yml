name: MkDocs Site
on:
  workflow_call:
    inputs:
      version:
        description: "Optional version of deployment."
        type: string
        required: false
        default: ""
      artifact-name:
        description: "Artifact name for the built site."
        type: string
        required: false
        default: "github-pages"
    outputs:
      host:
        description: The host name for the site
        value: ${{ jobs.build-site.outputs.host }}
      base-path:
        description: The base-path for the site
        value: ${{ jobs.build-site.outputs.base-path }}
      base-url:
        description: The base url for the site
        value: ${{ jobs.build-site.outputs.base-url }}
      version:
        description: The version number
        value: ${{ jobs.build-site.outputs.version }}
      artifact-name:
        description: The name of the site artifact
        value: ${{ jobs.build-site.outputs.artifact-name }}

jobs:
  build-site:
    runs-on: ubuntu-latest
    outputs:
      host: ${{ steps.settings.outputs.host }}
      base-path: ${{ steps.settings.outputs.base_path }}
      base-url: ${{ steps.settings.outputs.base_url }}
      version: ${{ steps.settings.outputs.version }}
      artifact-name: ${{ inputs.artifact-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Settings
        id: settings
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          echo "version=${version}" | tee -a "$GITHUB_OUTPUT"

          base_path="${{ steps.pages.outputs.base_path }}"
          base_url="${{ steps.pages.outputs.base_url }}"
          if [ -n "$version" ]; then
            base_path="${base_path}/${version}"
            base_url="${base_url}/${version}"
          fi
          echo "base_path=${base_path}" | tee -a "$GITHUB_OUTPUT"
          echo "base_url=${base_url}" | tee -a "$GITHUB_OUTPUT"

          host="${{ steps.pages.outputs.host }}"
          echo "host=${host}" | tee -a "$GITHUB_OUTPUT"

      - name: Setup mkdocs config
        uses: athackst/ci/actions/mkdocs-config@main

      - name: Build docs
        id: mkdocs
        uses: athackst/mkdocs-simple-plugin@main
        with:
          push: false
          site_url: ${{ steps.settings.outputs.base_url }}

      - name: Debug output
        run: |
          tree site
          cat mkdocs.yml
          cat site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: ${{ inputs.artifact-name }}
          path: ./site
