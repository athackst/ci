name: CI Updater

on:
  workflow_call:
    inputs:
      dry-run:
        description: Detect and report template changes while preserving repository state.
        type: boolean
        required: false
        default: false
      pr-branch:
        description: Branch name used for template updates.
        type: string
        required: false
        default: ci/update-ci-template
      checkout-ref:
        description: Optional git ref to check out before applying template updates.
        type: string
        required: false
        default: ""
      template-ref:
        description: Optional CI template ref to apply. Defaults to HEAD.
        type: string
        required: false
        default: HEAD
      answers-file:
        description: Copier answers file to use for the CI template update.
        type: string
        required: false
        default: .copier-answers.ci.yml
    secrets:
      token:
        description: Optional token override for checkout, push, and PR operations.
        required: false
    outputs:
      changed:
        description: Whether template changes were produced by Copier.
        value: ${{ jobs.update.outputs.changed }}
      changed-files:
        description: Newline-delimited list of Copier-managed files changed by the update.
        value: ${{ jobs.update.outputs.changed-files }}
      branch:
        description: Branch name used for the update PR; empty when no PR is created.
        value: ${{ jobs.update.outputs.pr-branch }}
      pr-url:
        description: URL for the update PR; empty when no PR is created.
        value: ${{ jobs.update.outputs.pr-url }}

jobs:
  update:
    if: ${{ inputs.dry-run || vars.CI_UPDATE_ENABLED != 'false' }}
    uses: ./.github/workflows/copier_update.yml
    with:
      dry-run: ${{ inputs.dry-run }}
      pr-branch: ${{ inputs.pr-branch }}
      pr-title: "chore: update CI template"
      pr-labels: "automerge, skip-changelog"
      commit-message: "chore: apply CI template update"
      checkout-ref: ${{ inputs.checkout-ref }}
      template-ref: ${{ inputs.template-ref }}
      answers-file: ${{ inputs.answers-file }}
    secrets:
      token: ${{ secrets.token }}
