name: CI Updater

on:
  workflow_call:
    inputs:
      create-pr:
        description: Create or update a PR with template changes.
        type: boolean
        required: false
        default: true
      automerge:
        description: Deprecated. Retained for compatibility; updater PRs are labeled automatically.
        type: boolean
        required: false
        default: false
      pr-branch:
        description: Branch name used for template updates.
        type: string
        required: false
        default: ci/update-ci-template
      pr-title:
        description: Pull request title.
        type: string
        required: false
        default: "chore: update CI template"
      commit-message:
        description: Commit message for template updates.
        type: string
        required: false
        default: "chore: apply CI template update"
      checkout-ref:
        description: Optional git ref to check out before applying template updates.
        type: string
        required: false
        default: ""
    secrets:
      token:
        description: Optional token override for checkout, push, and PR operations.
        required: false
    outputs:
      changed:
        description: Whether template changes were produced by Copier.
        value: ${{ jobs.update.outputs.changed }}
      changed-files:
        description: Newline-delimited list of Copier-managed files changed by the update.
        value: ${{ jobs.update.outputs.changed-files }}
      branch:
        description: Branch name used for the update, whether a PR was created or changes were pushed directly.
        value: ${{ jobs.update.outputs.branch }}
      pr-url:
        description: URL for the update PR, if one was created or updated.
        value: ${{ jobs.update.outputs.pr-url }}

permissions:
  contents: write
  pull-requests: write
  issues: write
  # Required in this environment to allow PRs that modify .github/workflows/*.
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
      changed-files: ${{ steps.changes.outputs.changed-files }}
      branch: ${{ steps.pr.outputs.pull-request-branch || steps.push-branch.outputs.branch }}
      pr-url: ${{ steps.pr.outputs.pull-request-url }}
    env:
      ANSWERS_FILE: .copier-answers.ci.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
          fetch-depth: 0
          token: ${{ secrets.token || github.token }}

      - name: Install Copier
        shell: bash
        run: |
          python3 -m pip install --quiet copier

      - name: Apply template updates
        id: apply
        shell: bash
        env:
          VCS_REF: ${{ inputs.checkout-ref || 'HEAD'}}
        run: |
          set -euo pipefail
          if [ ! -f "${{ env.ANSWERS_FILE }}" ]; then
            echo "No ${{ env.ANSWERS_FILE }} found; skipping Copier update."
            echo "ran=false" | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ran=true" | tee -a "$GITHUB_OUTPUT"
          copier update --trust -a "${{ env.ANSWERS_FILE }}" -A --vcs-ref ${{ env.VCS_REF }} --defaults

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          STATUS_OUTPUT="$(git status --short -- .github "${{ env.ANSWERS_FILE }}")"

          if [ -n "$STATUS_OUTPUT" ]; then
            CHANGED_FILES="$(printf '%s\n' "$STATUS_OUTPUT" | sed -E 's/^.. //')"
            echo "changed=true" | tee -a "$GITHUB_OUTPUT"
            {
              echo "changed-files<<EOF_CHANGED_FILES"
              printf '%s\n' "$CHANGED_FILES"
              echo "EOF_CHANGED_FILES"
            } | tee -a "$GITHUB_OUTPUT"

            echo "Detected Copier-managed changes:"
            printf '%s\n' "$STATUS_OUTPUT"
            echo ""
            echo "Diffstat:"
            git diff --stat -- .github "${{ env.ANSWERS_FILE }}"
            echo ""
            echo "Diff:"
            git diff -- .github "${{ env.ANSWERS_FILE }}"
          else
            echo "changed=false" | tee -a "$GITHUB_OUTPUT"
            {
              echo "changed-files<<EOF_CHANGED_FILES"
              echo ""
              echo "EOF_CHANGED_FILES"
            } | tee -a "$GITHUB_OUTPUT"
            echo "No Copier-managed changes detected under .github or ${{ env.ANSWERS_FILE }}."
          fi

      - name: Detect Copier conflicts
        id: conflicts
        if: ${{ steps.changes.outputs.changed == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          CONFLICTED_FILES="$(git diff --name-only --diff-filter=U -- .github "${{ env.ANSWERS_FILE }}")"

          if [ -z "$CONFLICTED_FILES" ]; then
            echo "found=false" | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" | tee -a "$GITHUB_OUTPUT"
          {
            echo "files<<EOF_CONFLICTED_FILES"
            printf '%s\n' "$CONFLICTED_FILES"
            echo "EOF_CONFLICTED_FILES"
          } | tee -a "$GITHUB_OUTPUT"

          echo "Copier update left merge conflicts in managed files:"
          printf '%s\n' "$CONFLICTED_FILES"
          echo ""
          echo "Conflict index entries:"
          git ls-files -u -- .github "${{ env.ANSWERS_FILE }}"
          echo ""
          echo "Managed diff:"
          git diff -- .github "${{ env.ANSWERS_FILE }}"

      - name: Stop on Copier conflicts
        if: ${{ steps.conflicts.outputs.found == 'true' }}
        shell: bash
        run: |
          echo "Stopping before branch push or PR creation because Copier produced merge conflicts."
          exit 1

      - name: Create or update PR
        id: pr
        if: ${{ inputs.create-pr && steps.changes.outputs.changed == 'true' && steps.conflicts.outputs.found != 'true' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.token || github.token }}
          base: ${{ github.event.repository.default_branch }}
          branch: ${{ inputs.pr-branch }}
          commit-message: ${{ inputs.commit-message }}
          title: ${{ inputs.pr-title }}
          body: ${{ inputs.commit-message }}
          labels: automerge, skip-changelog

      - name: Push update branch
        id: push-branch
        if: ${{ !inputs.create-pr && steps.changes.outputs.changed == 'true' && steps.conflicts.outputs.found != 'true' }}
        shell: bash
        env:
          BRANCH_NAME: ${{ inputs.pr-branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH_NAME"
          git add -A -- .github ${{ env.ANSWERS_FILE }}
          git commit -m "${{ inputs.commit-message }}"
          git push --force-with-lease origin "$BRANCH_NAME"
          echo "branch=$BRANCH_NAME" | tee -a "$GITHUB_OUTPUT"

      - name: Upsert failure issue
        if: ${{ failure() }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.token || github.token }}
          script: |
            const marker = '<!-- ci-updater-failure-issue -->'
            const title = `CI Updater failed (${process.env.RUN_ID})`
            const conflictFiles = process.env.CONFLICTED_FILES || ''
            const body = [
              marker,
              'A step failed in the CI Updater workflow.',
              '',
              `- Workflow: ${process.env.WORKFLOW}`,
              `- Run: ${process.env.SERVER_URL}/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID}`,
              `- Target branch input: \`${process.env.PR_BRANCH}\``,
              `- PR title input: \`${process.env.PR_TITLE}\``,
              ...(conflictFiles
                ? [
                    '',
                    'Copier produced merge conflicts in:',
                    '```text',
                    conflictFiles,
                    '```',
                  ]
                : []),
              '',
              'You may need to run copier locally',
              '```bash',
              'copier update --trust -a ${{ env.ANSWERS_FILE }} -A --vcs-ref HEAD --defaults',
              '```',
            ].join('\n')

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            })
            const existingIssue = openIssues.find((issue) =>
              !issue.pull_request && issue.body && issue.body.includes(marker)
            )

            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                title,
                body,
              })
              return
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            })
        env:
          WORKFLOW: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          PR_BRANCH: ${{ inputs.pr-branch }}
          PR_TITLE: ${{ inputs.pr-title }}
          CONFLICTED_FILES: ${{ steps.conflicts.outputs.files || '' }}

      - name: Close recovered failure issue
        if: ${{ success() }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.token || github.token }}
          script: |
            const marker = '<!-- ci-updater-failure-issue -->'
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            })
            const failureIssues = openIssues.filter((issue) =>
              !issue.pull_request && issue.body && issue.body.includes(marker)
            )

            for (const issue of failureIssues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  'CI Updater completed successfully.',
                  '',
                  `- Workflow: ${process.env.WORKFLOW}`,
                  `- Run: ${process.env.SERVER_URL}/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID}`,
                ].join('\n'),
              })
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              })
            }
        env:
          WORKFLOW: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}

      - name: Workflow summary
        if: ${{ always() }}
        shell: bash
        env:
          APPLY_RAN: ${{ steps.apply.outputs.ran || 'false' }}
          CHANGED: ${{ steps.changes.outputs.changed || 'false' }}
          CHANGED_FILES: ${{ steps.changes.outputs.changed-files || '' }}
          CONFLICT_FOUND: ${{ steps.conflicts.outputs.found || 'false' }}
          CONFLICTED_FILES: ${{ steps.conflicts.outputs.files || '' }}
          CREATE_PR_REQUESTED: ${{ inputs.create-pr }}
          PR_BRANCH_INPUT: ${{ inputs.pr-branch }}
          PR_OPERATION: ${{ steps.pr.outputs.pull-request-operation }}
          PR_NUMBER: ${{ steps.pr.outputs.pull-request-number }}
          PR_URL: ${{ steps.pr.outputs.pull-request-url }}
          PR_BRANCH: ${{ steps.pr.outputs.pull-request-branch || steps.push-branch.outputs.branch }}
        run: |
          set -euo pipefail

          {
            echo "## CI Updater"
            echo ""

            if [ "${APPLY_RAN}" != "true" ]; then
              echo ":grey_exclamation: No update attempted (missing \`${{ env.ANSWERS_FILE }}\`)."
            elif [ "${CONFLICT_FOUND}" = "true" ]; then
              echo ":x: Copier update produced merge conflicts; no branch was pushed and no PR was created."
              echo ""
              echo "Resolve these files in the consumer repo, then rerun CI Updater."
              echo ""
              echo "conflicted-files:"
              echo '```text'
              printf '%s\n' "${CONFLICTED_FILES}"
              echo '```'
            elif [ "${CHANGED}" != "true" ]; then
              echo ":white_check_mark: Copier ran, but no file changes were produced."
            elif [ -n "${PR_URL}" ]; then
              echo ":white_check_mark: PR created or updated successfully."
              echo ""
              echo "pr-operation: \`${PR_OPERATION:-unknown}\`"
              echo "pr-number: \`${PR_NUMBER}\`"
              echo "pr-branch: \`${PR_BRANCH:-$PR_BRANCH_INPUT}\`"
              echo "pr-url: ${PR_URL}"
            elif [ "${CREATE_PR_REQUESTED}" = "true" ]; then
              echo ":x: No PR created or updated."
              echo ""
              echo "pr-operation: \`${PR_OPERATION:-none}\`"
            else
              echo ":white_check_mark: Update branch pushed without creating a PR."
              echo ""
              echo "pr-branch: \`${PR_BRANCH:-$PR_BRANCH_INPUT}\`"
            fi

            if [ -n "${CHANGED_FILES}" ] && [ "${CONFLICT_FOUND}" != "true" ]; then
              echo ""
              echo "changed-files:"
              echo '```text'
              printf '%s\n' "${CHANGED_FILES}"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
