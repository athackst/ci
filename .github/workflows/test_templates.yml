name: Test Templates

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: "test-templates-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true


jobs:
  copier-freshness:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Apply Copier template
        id: copier
        uses: ./actions/copier-copy
        with:
          vcs-ref: HEAD

      - name: Verify generated files are current
        if: ${{ always() }}
        shell: bash
        env:
          COPIER_OUTCOME: ${{ steps.copier.outcome }}
          CHANGED: ${{ steps.copier.outputs.changed || 'false' }}
          CHANGED_FILES: ${{ steps.copier.outputs.changed-files || '' }}
          COMMAND: ${{ steps.copier.outputs.command || '' }}
        run: |
          set -euo pipefail

          STATUS="success"
          SUMMARY="Committed generated files are current."

          if [ "$COPIER_OUTCOME" != "success" ]; then
            STATUS="failure"
            SUMMARY="Copier failed while checking generated files."
          elif [ "$CHANGED" = "true" ]; then
            STATUS="failure"
            SUMMARY="Committed generated files differ from the current template."
          fi

          {
            echo "### Copier freshness"
            echo ""
            if [ "$STATUS" = "success" ]; then
              echo ":white_check_mark: $SUMMARY"
            else
              echo ":x: $SUMMARY"
            fi

            if [ -n "$COMMAND" ]; then
              echo ""
              echo "Command:"
              echo '```text'
              printf '%s\n' "$COMMAND"
              echo '```'
            fi

            if [ -n "$CHANGED_FILES" ]; then
              echo ""
              echo "Changed files:"
              echo '```text'
              printf '%s\n' "$CHANGED_FILES"
              echo '```'
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$STATUS" != "success" ]; then
            exit 1
          fi

  test-copier:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install template test dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install copier
        shell: bash
        run: |
          python3 -m pip install --quiet copier

      - name: Download actionlint
        id: get_actionlint
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        shell: bash

      - name: Verify Copier template outputs
        shell: bash
        env:
            ACTIONLINT: ${{ steps.get_actionlint.outputs.executable }}
        run: |
          set +e
          BATS_OUTPUT="$(bats copier/tests/copier_template_outputs.bats 2>&1)"
          BATS_STATUS=$?
          set -e
          TEST_SUMMARY="Copier template output test"
          if [ "$BATS_STATUS" -eq 0 ]; then
            TEST_SUMMARY=":white_check_mark: $TEST_SUMMARY passed."
          else
            TEST_SUMMARY=":x: $TEST_SUMMARY failed."
          fi
          echo "$TEST_SUMMARY"

          echo "$BATS_OUTPUT"

          {
            echo "### Copier template outputs"
            echo ""
            echo "<details><summary>$TEST_SUMMARY</summary>"
            echo ""
            echo '```text'
            echo "$BATS_OUTPUT"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$BATS_STATUS"

  templates-success:
    if: ${{ always() }}
    needs:
      - copier-freshness
      - test-copier
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate upstream job results
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          UNSUCCESSFUL_JOBS="$(jq -r '
            to_entries[]
            | select(.value.result != "success")
            | "\(.key): \(.value.result)"
          ' <<< "$NEEDS_JSON")"

          {
            echo "## Template Test Results"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            jq -r '
              to_entries[]
              | "| `\(.key)` | \(if .value.result == "success" then ":white_check_mark:" else ":x:" end) \(.value.result) |"
            ' <<< "$NEEDS_JSON"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$UNSUCCESSFUL_JOBS" ]; then
            echo "Template tests did not all pass:"
            printf '%s\n' "$UNSUCCESSFUL_JOBS"
            exit 1
          fi

          echo "All template tests passed."
