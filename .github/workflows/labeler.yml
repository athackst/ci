name: Labeler
on:
  workflow_call:
    secrets:
      token:
        description: Optional token override for PR labeling.
        required: false

jobs:
  pr-labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Run PR labeler
        id: labeler
        uses: athackst/ci/actions/pr-labeler@main
        with:
          github_token: ${{ secrets.token || github.token }}
          configuration-path: .github/ci-config.yml

      - name: Summarize added labels
        if: ${{ (steps.labeler.outputs.new-labels || '') != '' }}
        shell: bash
        env:
          NEW_LABELS: ${{ steps.labeler.outputs.new-labels }}
        run: |
          set -euo pipefail

          {
            echo "### PR Labeler"
            echo ""
            echo "Added labels:"
            echo ""
            echo '```text'
            printf '%s\n' "$NEW_LABELS"
            echo '```'
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
